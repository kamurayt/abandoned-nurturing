<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ネコと武器のインフレ転生RPG</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; text-align: center; background-color: #f0f0f0; padding: 10px; color: #333; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 100%; position: relative; }
        .btn { padding: 10px; font-size: 14px; cursor: pointer; margin: 3px; border-radius: 5px; border: 1px solid #ccc; background-color: #fff; font-weight: bold; transition: 0.2s; }
        .btn:hover { background-color: #e0e0e0; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .status { margin: 12px 0; font-size: 14px; font-weight: bold; display: flex; justify-content: space-around; background: #fafafa; padding: 8px; border-radius: 5px; border: 1px solid #eee; }
        .log-box { border: 1px solid #ccc; height: 110px; overflow-y: scroll; background: #fafafa; padding: 10px; font-size: 12px; text-align: left; margin-top: 15px; border-radius: 5px; }
        
        /* 縦並びの綺麗なパーティUI */
        .party-grid { display: flex; gap: 6px; margin: 10px 0; width: 100%; justify-content: space-between; }
        .party-card { border: 1px solid #ddd; padding: 8px 4px; border-radius: 5px; background: #fdfdfd; text-align: center; flex: 1; min-width: 0; cursor: pointer; transition: 0.2s; }
        .party-card:hover { background: #f0f0f0; border-color: #999; }
        .party-card.empty { background: #eee; border: 1px dashed #aaa; color: #999; display: flex; align-items: center; justify-content: center; font-size: 12px; min-height: 190px; cursor: default; }
        .party-card.empty:hover { background: #eee; border-color: #aaa; }
        .party-card h4 { margin: 0 0 4px 0; color: #444; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* ご要望：上キャラ、下武器の順 */
        .cat-img-box { width: 100%; max-width: 65px; height: 65px; margin: 0 auto 5px auto; background: #fff; border: 1px solid #eee; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .cat-img { width: 100%; height: 100%; object-fit: contain; }
        .weapon-img-box { width: 100%; max-width: 45px; height: 45px; margin: 5px auto 2px auto; background: #f0f0f0; border: 1px dashed #bbb; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .weapon-img { width: 100%; height: 100%; object-fit: contain; }
        .weapon-text { font-size: 10px; color: #666; min-height: 24px; display: flex; align-items: center; justify-content: center; font-weight: bold; line-height: 1.2; }
        
        /* 敵・バトルエリア */
        .enemy-box { margin: 10px 0; text-align: center; }
        .enemy-img { width: 110px; height: 110px; object-fit: contain; background: #fafafa; border-radius: 8px; margin-bottom: 3px; display: inline-block; }
        .hp-bar-container { background: #ddd; width: 100%; height: 14px; border-radius: 10px; margin: 6px 0; overflow: hidden; }
        .hp-bar { background: #ff4d4d; width: 100%; height: 100%; transition: width 0.1s; }
        
        .section-title { font-size: 13px; font-weight: bold; margin-top: 12px; border-bottom: 2px solid #ccc; padding-bottom: 3px; text-align: left; color: #444; }
        .treasure-box { background: #f9f9f9; border: 1px dashed #aaa; padding: 6px; font-size: 11px; text-align: left; max-height: 65px; overflow-y: auto; margin-top: 5px; width: 100%; }
        .flex-row { display: flex; gap: 6px; margin-top: 6px; width: 100%; align-items: stretch; }
        .flex-item { flex: 1; min-width: 0; }
        
        /* ポップアップ・メニュー共通 */
        .overlay-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; padding: 15px; box-sizing: border-box; z-index: 100; }
        .pop-content { max-width: 400px; margin: 80px auto; text-align: left; background: #222; padding: 20px; border-radius: 10px; border: 2px solid #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.4); }
        .pop-content p { margin: 8px 0; font-size: 14px; line-height: 1.4; }
        
        /* 広告バフUI */
        .ad-banner { background: #fff3cd; border: 1px solid #ffeeba; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="ad-banner">
        <div style="text-align: left;">
            📺 広告バフ：<span id="ad-buff-text" style="color:#d63031;">OFF</span><br>
            <span id="ad-timer-text" style="color:#666; font-size:11px;">動画視聴で3分間【全効果3倍】</span>
        </div>
        <div style="display:flex; flex-direction:column; gap:4px;">
            <button class="btn" style="margin:0; padding:5px 8px; font-size:11px; background:#2ed573; color:white; border:none;" onclick="watchAd()">動画を見てバフON</button>
            <label style="font-size:10px; color:#555; cursor:pointer;"><input type="checkbox" id="no-ads-cheat" onchange="toggleNoAds()"> 👑広告なし(課金)</label>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 5px;">
        <h1 style="margin:0; font-size:16px;">🐱 ネコインフレRPG</h1>
        <button class="btn" style="margin:0; padding:4px 10px; font-size:12px;" onclick="openMenuOverlay()">MENU</button>
    </div>
    
    <h2 id="stage-display" style="margin: 8px 0 2px 0; font-size: 18px;">STAGE 1</h2>
    <div style="font-size: 11px; color: #666;" id="hit-requirement">必要命中値: 0</div>
    
    <div class="enemy-box">
        <img id="enemy-main-img" src="001.png" class="enemy-img" alt="敵ボス"><br>
        <div style="font-size: 15px; font-weight: bold;" id="enemy-name">スライム</div>
    </div>
    
    <div class="hp-bar-container"><div class="hp-bar" id="enemy-hp-bar"></div></div>
    <div id="enemy-hp-text" style="font-size:12px; font-weight:bold;">HP: 100 / 100</div>

    <div class="status">
        <span>💰 <span id="res-gold">0</span> G</span>
        <span>💎 <span id="res-diamond">0</span></span>
        <span>🌀 <span id="res-prestige">0</span> Pt</span>
    </div>

    <div class="section-title">🛡️ 出撃パーティ (枠を押すと個別ステータス表示)</div>
    <div class="party-grid">
        <div class="party-card" id="card-slot-1" onclick="clickSlot(0)">
            <h4 id="name-cat-1">茶ネコ</h4>
            <div class="cat-img-box"><img src="002.png" class="cat-img" id="cat-main-img-1" alt="キャラ"></div>
            <div class="weapon-img-box"><img id="weap-img-cat-1" class="weapon-img" src="021.png" alt="武器"></div>
            <div class="weapon-text" id="weap-cat-1">木の棒</div>
            <div style="color: #d63031; font-weight: bold; font-size:11px;">ATK:<span id="atk-cat-1">10</span></div>
        </div>
        <div class="party-card empty" id="card-slot-2" onclick="clickSlot(1)"><div>銃枠<br>未解放</div></div>
        <div class="party-card empty" id="card-slot-3" onclick="clickSlot(2)"><div>魔法枠<br>未解放</div></div>
    </div>

    <div class="section-title">💪 ゴールド常時強化</div>
    <div class="flex-row" style="align-items: center;">
        <div class="flex-item"><button class="btn" style="width:100%; font-size:11px; padding:6px; margin:0;" id="btn-up-atk" onclick="buyUpgrade('atk')">攻撃強化 (+2)<br><span id="cost-up-atk">10</span>G (Lv<span id="lv-up-atk">0</span>)</button></div>
        <div class="flex-item"><button class="btn" style="width:100%; font-size:11px; padding:6px; margin:0;" id="btn-up-hit" onclick="buyUpgrade('hit')">命中強化 (+1)<br><span id="cost-up-hit">15</span>G (Lv<span id="lv-up-hit">0</span>)</button></div>
        <div style="text-align: right; font-size: 11px; font-weight: bold; min-width: 80px; line-height: 1.2;">
            命中: <span id="total-hit-val" style="color:#00b894;">0</span><br>
            確率: <span id="current-hit-rate">100</span>%
        </div>
    </div>

    <div class="section-title">🎰 ガチャ ＆ 🔄 時空転生</div>
    <div class="flex-row">
        <div class="flex-item"><button class="btn" style="width: 100%; margin:0; font-size:11px; padding:8px; background:#ff9f43; color:white; border:none;" onclick="rollGacha('weapon')">武器ガチャ<br>(💎100)</button></div>
        <div class="flex-item"><button class="btn" style="width: 100%; margin:0; font-size:11px; padding:8px; background:#0abde3; color:white; border:none;" onclick="rollGacha('cat')">キャラガチャ<br>(💎150)</button></div>
        <div class="flex-item"><button class="btn" style="width: 100%; margin:0; font-size:11px; padding:8px;" id="btn-do-prestige" onclick="doPrestige()">時空転生<br><span style="font-size:9px;">(+<span id="gain-prestige-pt">0</span>)</span></button></div>
    </div>
    <div class="flex-row">
        <div class="flex-item"><button class="btn" style="width: 100%; margin:0; font-size:12px; padding:8px;" id="btn-buy-treasure" onclick="buyTreasure()">お宝ガチャ (🌀10Pt)</button></div>
        <div class="flex-item" style="text-align: left;"><div class="treasure-box" id="treasure-display">🎁 所持宝物: なし</div></div>
    </div>
    <div id="gacha-result" style="font-size:11px; margin-top:4px; color:#e17055; font-weight:bold; min-height:14px; text-align:center;"></div>

    <div class="log-box" id="battle-log"></div>
</div>

<div id="status-popup" class="overlay-screen" onclick="closePopup()">
    <div class="pop-content" onclick="event.stopPropagation()">
        <h2 id="pop-title" style="color: #ffd700; margin-top: 0; border-bottom: 2px solid #ffd700; padding-bottom: 5px; font-size:18px;">詳細ステータス</h2>
        <div id="pop-body"></div>
        <button class="btn" style="width:100%; margin-top:15px; background:#e74c3c; color:white; border:none; padding:8px;" onclick="closePopup()">閉じる</button>
    </div>
</div>

<div id="menu-overlay" class="overlay-screen" onclick="closeMenuOverlay()">
    <div class="pop-content" style="background: #222; border-color: #444;" onclick="event.stopPropagation()">
        <h2 style="color: #fff; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 5px; font-size:16px;">📑 全体情報</h2>
        <div id="detailed-stats" style="line-height: 1.5; font-size: 12px; background:#333; padding:10px; border-radius:5px;"></div>
        <button class="btn" style="width:100%; margin-top:15px; background:#555; color:white; border:none; padding:8px;" onclick="closeMenuOverlay()">閉じる</button>
    </div>
</div>

<script>
// --- 📋 マスターデータベース（001〜035を完全網羅） ---
const ENEMIES_DB = {
    '001': { name: 'スライム', img: '001.png' },
    '017': { name: 'レッドゴブリン', img: '017.png' },
    '018': { name: 'マッドオーク', img: '018.png' },
    '019': { name: 'ストーンゴーレム', img: '019.png' },
    '020': { name: 'インフレドラゴン', img: '020.png' }
};

const CATS_DB = {
    '002': { name: '見習い茶ネコ', type: '剣', baseAtk: 10, img: '002.png' },
    '003': { name: '新米銃ネコ', type: '銃', baseAtk: 8, img: '003.png' },
    '004': { name: '魔習いネコ', type: '魔法', baseAtk: 15, img: '004.png' },
    '005': { name: '熱血ナイトネコ', type: '剣', baseAtk: 80, img: '005.png' },
    '006': { name: 'スナイパーネコ', type: '銃', baseAtk: 65, img: '006.png' },
    '007': { name: 'エレメントネコ', type: '魔法', baseAtk: 120, img: '007.png' },
    '008': { name: '熟練サムライネコ', type: '剣', baseAtk: 750, img: '008.png' },
    '009': { name: 'ガトリングネコ', type: '銃', baseAtk: 600, img: '009.png' },
    '010': { name: '大魔導士ネコ', type: '魔法', baseAtk: 1100, img: '010.png' },
    '011': { name: '暗黒騎士ネコ', type: '剣', baseAtk: 7000, img: '011.png' },
    '012': { name: 'レーザー狙撃ネコ', type: '銃', baseAtk: 5500, img: '012.png' },
    '013': { name: '時空魔術ネコ', type: '魔法', baseAtk: 9500, img: '013.png' },
    '014': { name: '天界王ネコ', type: '剣', baseAtk: 65000, img: '014.png' },
    '015': { name: '量子銃神ネコ', type: '銃', baseAtk: 50000, img: '015.png' },
    '016': { name: '終焉創世魔ネコ', type: '魔法', baseAtk: 100000, img: '016.png' }
};

const WEAPONS_DB = {
    '021': { name: 'ひのきの棒', type: '剣', baseAtk: 5, img: '021.png', rare: 1 },
    '022': { name: 'おもちゃの銃', type: '銃', baseAtk: 4, img: '022.png', rare: 1 },
    '023': { name: 'おばあちゃんの杖', type: '魔法', baseAtk: 8, img: '023.png', rare: 1 },
    '024': { name: 'ブロンズソード', type: '剣', baseAtk: 60, img: '024.png', rare: 2 },
    '025': { name: 'アイアンリボルバー', type: '銃', baseAtk: 45, img: '025.png', rare: 2 },
    '026': { name: '見習いの魔導書', type: '魔法', baseAtk: 90, img: '026.png', rare: 2 },
    '027': { name: '鋼鉄の大剣', type: '剣', baseAtk: 550, img: '027.png', rare: 3 },
    '028': { name: 'アサルトライフル', type: '銃', baseAtk: 400, img: '028.png', rare: 3 },
    '029': { name: '賢者のルビー杖', type: '魔法', baseAtk: 800, img: '029.png', rare: 3 },
    '030': { name: '魔剣レヴァテイン', type: '剣', baseAtk: 6000, img: '030.png', rare: 4 },
    '031': { name: 'プラズマカノン', type: '銃', baseAtk: 4500, img: '031.png', rare: 4 },
    '032': { name: '大賢者の天球儀', type: '魔法', baseAtk: 9000, img: '032.png', rare: 4 },
    '033': { name: '神剣エクスカリバー', type: '剣', baseAtk: 70000, img: '033.png', rare: 5 },
    '034': { name: '対神滅殺超波動銃', type: '銃', baseAtk: 55000, img: '034.png', rare: 5 },
    '035': { name: '終焉創世神の魔導書', type: '魔法', baseAtk: 120000, img: '035.png', rare: 5 }
};

const TREASURES = {
    't1': { name: '錆びた手鏡', type: 'atk', val: 0.05 },
    't2': { name: '旅人の財布', type: 'gold', val: 0.05 },
    't3': { name: '古びた虫眼鏡', type: 'hit_p', val: 0.02 },
    't4': { name: '魔導師の魔導書', type: 'pt', val: 0.20 },
    't5': { name: 'インフレの刻印', type: 'pt', val: 1.00 }
};

// --- ゲーム状態 ---
let player = {
    gold: 0, diamond: 0, prestigePt: 0, stage: 1,
    ownedCats: { '002': 1 }, // 初期は「002：見習い茶ネコ」を所持(Lv1)
    inventory: { '021': 1 }, // 初期は「021：ひのきの棒」を所持(1凸)
    treasures: {},
    upgrades: { atk: 0, hit: 0 }
};

let enemy = { hp: 100, maxHp: 100, id: '001', name: 'スライム' };
const DROP_CHANCE = 0.25;

// 📺 広告バフ管理用（加算式・上限なし）
let adBuffTimer = 0;
let adWatchCount = 0;
let isNoAdsPurchased = false;

// パーティ配置枠の型指定(0:剣枠, 1:銃枠, 2:魔法枠)
let partySlots = [
    { type: '剣', catId: '002', weapId: '021' },
    { type: '銃', catId: null, weapId: null },
    { type: '魔法', catId: null, weapId: null }
];

// 💬 ポップアップ表示
function clickSlot(index) {
    let slot = partySlots[index];
    if (!slot.catId) {
        alert("この枠のキャラはまだ解放されていません！ガチャで当てよう！");
        return;
    }
    
    let cat = CATS_DB[slot.catId];
    let catCount = player.ownedCats[slot.catId] || 1;
    let catBonusPercent = (catCount - 1) * 5; // 1体被るごとに+5%

    let weapHtml = "無し";
    if (slot.weapId) {
        let w = WEAPONS_DB[slot.weapId];
        let wCount = player.inventory[slot.weapId] || 1;
        let wBonusPercent = ((wCount - 1) * 0.5).toFixed(1); // 1本被るごとに+0.5%
        weapHtml = `
            <br>
            <strong style="color:#0abde3;">⚔️ 装備：${w.name}</strong><br>
            ・武器基礎攻撃力: <strong>${w.baseAtk}</strong><br>
            ・ガチャ重複加算補正: <strong>+${wBonusPercent}%</strong> (${wCount}本所持)
        `;
    }

    document.getElementById('pop-title').innerText = `【詳細】${cat.name}`;
    document.getElementById('pop-body').innerHTML = `
        <p><strong style="color:#ff9f43;">🐱 キャラクター：${cat.name} (星${catCount})</strong></p>
        <p>・キャラ基礎攻撃力: <strong>${cat.baseAtk}</strong></p>
        <p>・ガチャ重複加算補正: <strong>+${catBonusPercent}%</strong></p>
        <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
        <p>${weapHtml}</p>
        <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
        <p style="font-size:12px; color:#aaa;">※このスロットの最終攻撃力は、キャラと武器の力を合わせた数値に、ゴールド強化、宝物効果、広告バフが全て掛け算されます。</p>
    `;
    document.getElementById('status-popup').style.display = 'block';
}

function closePopup() { document.getElementById('status-popup').style.display = 'none'; }
function openMenuOverlay() {
    document.getElementById('menu-overlay').style.display = 'block';
    showDetailedStats();
}
function closeMenuOverlay() { document.getElementById('menu-overlay').style.display = 'none'; }

function showDetailedStats() {
    let reqHit = getHitRequirement(player.stage);
    let myHit = getTotalHit();
    document.getElementById('detailed-stats').innerHTML = `
        ・最高到達ステージ: STAGE ${player.stage}<br>
        ・宝物攻撃補正: +${(getTreasureBonus('atk') * 100).toFixed(0)}%<br>
        ・宝物ゴールド補正: +${(getTreasureBonus('gold') * 100).toFixed(0)}%<br>
        ・広告バフ現在の加算倍率：+${adWatchCount > 0 ? (200 + (adWatchCount - 1) * 5) : 0}%<br>
        ・総命中ステータス: ${myHit} / 必要命中: ${reqHit}
    `;
}

// 📺 広告バフ処理
function watchAd() {
    if (isNoAdsPurchased) {
        log("👑 広告除去パス適用中！動画スキップで即バフ加算！");
        applyAdBuff();
    } else {
        alert("📺「動画広告を再生中... (約5秒の模擬タイマー)」");
        applyAdBuff();
    }
}
function applyAdBuff() {
    adWatchCount++; adBuffTimer = 180; // 3分
    let currentPercent = 200 + (adWatchCount - 1) * 5;
    document.getElementById('ad-buff-text').innerHTML = `🔥稼働中 (+${currentPercent}%)`;
    log(`📺 広告バフ適用！全報酬＆全火力が +${currentPercent}% 強化中！`);
    updateUI();
}
function toggleNoAds() {
    isNoAdsPurchased = document.getElementById('no-ads-cheat').checked;
    log(isNoAdsPurchased ? "👑 広告除去パス有効化（連打でバフが即時加算されます）" : "広告除去を無効にしました");
}
function handleAdTimer() {
    if (adBuffTimer > 0) {
        adBuffTimer--;
        let mins = Math.floor(adBuffTimer / 60), secs = adBuffTimer % 60;
        let currentPercent = 200 + (adWatchCount - 1) * 5;
        document.getElementById('ad-timer-text').innerText = `残り時間: ${mins}分${secs}秒 (現在 +${currentPercent}%)`;
        if (adBuffTimer === 0) {
            adWatchCount = 0;
            document.getElementById('ad-buff-text').innerText = "OFF";
            document.getElementById('ad-timer-text').innerText = "動画視聴で3分間【全効果3倍】";
            log("⏳ 広告バフの効果時間が終了しました。");
        }
    }
}
function getAdBuffMultiplier() {
    if (adBuffTimer <= 0 || adWatchCount === 0) return 1.0;
    return 1.0 + ((200 + (adWatchCount - 1) * 5) / 100);
}

function getHitRequirement(stg) {
    let block = Math.floor((stg - 1) / 5);
    const reqs = [0, 10, 35, 80, 180, 400, 900];
    return reqs[block] !== undefined ? reqs[block] : 900 + (block - 6) * 600;
}
function getEnemyMaxHp(stg) {
    if (stg <= 5) return 40 + stg * 60;
    let base = [2500, 30000, 250000, 3000000, 25000000, 400000000];
    let idx = Math.floor((stg - 1) / 5) - 1;
    return (base[idx] !== undefined ? base[idx] : 400000000 * Math.pow(10, idx - 5)) * (1 + (stg % 5) * 0.25);
}
function getPrestigePointGain() {
    if (player.stage < 5) return 0;
    return Math.floor(Math.pow(player.stage, 1.75) * 0.12 * (1 + getTreasureBonus('pt')));
}
function getTreasureBonus(type) {
    let bonus = 0;
    for (let id in player.treasures) { if (TREASURES[id].type === type) bonus += TREASURES[id].val + (player.treasures[id] - 1) * 0.01; }
    return bonus;
}
function getTotalHit() { return Math.floor(player.upgrades.hit * (1 + getTreasureBonus('hit_p'))); }

// スロットに自動的に「その武器タイプの中で最強の装備」を割り当てる内部計算
function getBestWeaponForType(type) {
    let bestAtk = -1, bestWId = null;
    for (let id in WEAPONS_DB) {
        if (WEAPONS_DB[id].type === type && player.inventory[id]) {
            let currentAtk = WEAPONS_DB[id].baseAtk * (1 + (player.inventory[id] - 1) * 0.005);
            if (currentAtk > bestAtk) { bestAtk = currentAtk; bestWId = id; }
        }
    }
    return { id: bestWId, atk: bestAtk };
}

// キャラガチャ・所持の中から、そのスロットの武器タイプで「最も基礎攻撃力が高いキャラ」を自動選抜
function autoSelectBestCatForSlot(type) {
    let bestAtk = -1, bestCatId = null;
    for (let id in CATS_DB) {
        if (CATS_DB[id].type === type && player.ownedCats[id]) {
            let score = CATS_DB[id].baseAtk * (1 + (player.ownedCats[id] - 1) * 0.05);
            if (score > bestAtk) { bestAtk = score; bestCatId = id; }
        }
    }
    return bestCatId;
}

function updateUI() {
    document.getElementById('res-gold').innerText = Math.floor(player.gold).toLocaleString();
    document.getElementById('res-diamond').innerText = player.diamond.toLocaleString();
    document.getElementById('res-prestige').innerText = player.prestigePt.toLocaleString();
    document.getElementById('stage-display').innerText = `STAGE ${player.stage}`;
    document.getElementById('hit-requirement').innerText = `必要命中値: ${getHitRequirement(player.stage)}`;
    
    let myHit = getTotalHit(), reqHit = getHitRequirement(player.stage);
    document.getElementById('total-hit-val').innerText = myHit;
    document.getElementById('current-hit-rate').innerText = myHit < reqHit ? Math.max(0, 100 - (reqHit - myHit)) : 100;

    let tAtkBonus = 1 + getTreasureBonus('atk'), flatAtkBonus = player.upgrades.atk * 2;
    let adMult = getAdBuffMultiplier();

    partySlots.forEach((slot, index) => {
        let slotNum = index + 1;
        let slotEl = document.getElementById(`card-slot-${slotNum}`);
        
        // 所持しているキャラの中から、このスロットタイプ（剣・銃・魔法）の最強を自動セット
        let bestCatId = autoSelectBestCatForSlot(slot.type);
        partySlots[index].catId = bestCatId;

        if (bestCatId) {
            let bestW = getBestWeaponForType(slot.type);
            partySlots[index].weapId = bestW.id;

            if (slotEl.classList.contains('empty')) {
                slotEl.classList.remove('empty');
                slotEl.innerHTML = `<h4 id="name-cat-${slotNum}">-</h4><div class="cat-img-box"><img src="" class="cat-img" id="cat-main-img-${slotNum}"></div><div class="weapon-img-box"><img id="weap-img-cat-${slotNum}" class="weapon-img" src="" alt=""></div><div class="weapon-text" id="weap-cat-${slotNum}">-</div><div style="color: #d63031; font-weight: bold; font-size:11px;">ATK:<span id="atk-cat-${slotNum}">0</span></div>`;
            }

            let cat = CATS_DB[bestCatId];
            let catCount = player.ownedCats[bestCatId];
            document.getElementById(`name-cat-${slotNum}`).innerText = `${cat.name} (星${catCount})`;
            document.getElementById(`cat-main-img-${slotNum}`).src = cat.img;

            // 火力計算
            let catFinalBase = cat.baseAtk * (1 + (catCount - 1) * 0.05);
            let weapFinalBase = bestW.id ? (bestW.atk) : 0;
            let finalAtk = Math.floor((catFinalBase + weapFinalBase + flatAtkBonus) * tAtkBonus * adMult);
            
            // 特殊武器アビリティ
            if (bestW.id === '033') finalAtk *= 2; // 神剣2倍
            if (bestW.id === '035') finalAtk *= 3; // 終焉書3倍

            document.getElementById(`atk-cat-${slotNum}`).innerText = finalAtk.toLocaleString();
            
            if (bestW.id) {
                document.getElementById(`weap-cat-${slotNum}`).innerText = `${WEAPONS_DB[bestW.id].name} (+${player.inventory[bestW.id]-1}凸)`;
                document.getElementById(`weap-img-cat-${slotNum}`).src = WEAPONS_DB[bestW.id].img;
                document.getElementById(`weap-img-cat-${slotNum}`).style.display = 'block';
            } else {
                document.getElementById(`weap-cat-${slotNum}`).innerText = "素手";
                document.getElementById(`weap-img-cat-${slotNum}`).style.display = 'none';
            }
        } else {
            slotEl.className = 'party-card empty';
            slotEl.innerHTML = `<div>${slot.type}ネコ枠<br>ガチャ未所持</div>`;
        }
    });

    let atkCost = Math.floor(10 * Math.pow(1.48, player.upgrades.atk));
    let hitCost = Math.floor(15 * Math.pow(1.55, player.upgrades.hit));
    document.getElementById('cost-up-atk').innerText = atkCost.toLocaleString();
    document.getElementById('btn-up-atk').disabled = player.gold < atkCost;
    document.getElementById('cost-up-hit').innerText = hitCost.toLocaleString();
    document.getElementById('btn-up-hit').disabled = player.gold < hitCost;
    document.getElementById('lv-up-atk').innerText = player.upgrades.atk;
    document.getElementById('lv-up-hit').innerText = player.upgrades.hit;
    document.getElementById('gain-prestige-pt').innerText = getPrestigePointGain().toLocaleString();

    let tHtml = "";
    for(let tid in player.treasures) { tHtml += `・${TREASURES[tid].name}Lv${player.treasures[tid]} `; }
    document.getElementById('treasure-display').innerHTML = tHtml ? `🎁 所持宝物: <br>${tHtml}` : "🎁 所持宝物: なし";

    let pct = Math.max(0, (enemy.hp / enemy.maxHp) * 100);
    document.getElementById('enemy-hp-bar').style.width = `${pct}%`;
    document.getElementById('enemy-hp-text').innerText = `HP: ${Math.floor(enemy.hp).toLocaleString()} / ${Math.floor(enemy.maxHp).toLocaleString()}`;
}

function log(msg) {
    let box = document.getElementById('battle-log');
    box.innerHTML += msg + "<br>"; box.scrollTop = box.scrollHeight;
}

function buyUpgrade(type) {
    let atkCost = Math.floor(10 * Math.pow(1.48, player.upgrades.atk));
    let hitCost = Math.floor(15 * Math.pow(1.55, player.upgrades.hit));
    if (type === 'atk' && player.gold >= atkCost) { player.gold -= atkCost; player.upgrades.atk++; }
    else if (type === 'hit' && player.gold >= hitCost) { player.gold -= hitCost; player.upgrades.hit++; }
    updateUI();
}

function rollGacha(gachaType) {
    let cost = gachaType === 'weapon' ? 100 : 150;
    if (player.diamond < cost) { alert("ダイヤが足りません！"); return; }
    player.diamond -= cost;
    
    let rand = Math.random() * 100;
    let rare = rand < 1.2 ? 5 : (rand < 5.5 ? 4 : (rand < 16 ? 3 : (rand < 35 ? 2 : 1)));

    if (gachaType === 'weapon') {
        let pool = [];
        for (let id in WEAPONS_DB) { if (WEAPONS_DB[id].rare === rare) pool.push(id); }
        let selectedId = pool[Math.floor(Math.random() * pool.length)];
        player.inventory[selectedId] = (player.inventory[selectedId] || 0) + 1;
        document.getElementById('gacha-result').innerText = `★${rare} 武器【${WEAPONS_DB[selectedId].name}】を獲得！`;
    } else {
        let pool = [];
        // レア度に応じて排出されるキャラDBをマッピング
        // 1: 002-004, 2: 005-007, 3: 008-010, 4: 011-013, 5: 014-016
        let startId = 2 + (rare - 1) * 3;
        for (let i = 0; i < 3; i++) {
            let idStr = String(startId + i).padStart(3, '0');
            if (CATS_DB[idStr]) pool.push(idStr);
        }
        let selectedId = pool[Math.floor(Math.random() * pool.length)];
        player.ownedCats[selectedId] = (player.ownedCats[selectedId] || 0) + 1;
        document.getElementById('gacha-result').innerText = `🐱 ★${rare} キャラ【${CATS_DB[selectedId].name}】が参戦！(重複強化)`;
    }
    updateUI();
}

function doPrestige() {
    let gain = getPrestigePointGain();
    if (gain <= 0) return;
    player.prestigePt += gain;
    player.stage = 1; player.gold = 0; player.upgrades.atk = 0; player.upgrades.hit = 0;
    log(`🔄 時空転生を行い、世界をリセットしました！`); spawnEnemy(); updateUI();
}

function buyTreasure() {
    if (player.prestigePt < 10) return;
    player.prestigePt -= 10;
    let keys = Object.keys(TREASURES);
    let rolled = keys[Math.floor(Math.random() * keys.length)];
    player.treasures[rolled] = (player.treasures[rolled] || 0) + 1;
    log(`🎁 宝物【${TREASURES[rolled].name}】を獲得・強化！`); updateUI();
}

function spawnEnemy() {
    let keys = Object.keys(ENEMIES_DB);
    let rolledId = keys[(player.stage - 1) % keys.length];
    enemy.id = rolledId;
    enemy.name = ENEMIES_DB[rolledId].name;
    enemy.maxHp = getEnemyMaxHp(player.stage);
    enemy.hp = enemy.maxHp;
    document.getElementById('enemy-main-img').src = ENEMIES_DB[rolledId].img;
}

function catAttack(slotIndex) {
    let slot = partySlots[slotIndex];
    if (!slot.catId) return; // キャラ未解放なら攻撃しない
    
    let reqHit = getHitRequirement(player.stage); let myHit = getTotalHit();
    if (myHit < reqHit && Math.random() * 100 > (100 - (reqHit - myHit))) return; // 命中判定

    let cat = CATS_DB[slot.catId];
    let catCount = player.ownedCats[slot.catId];
    let catFinalBase = cat.baseAtk * (1 + (catCount - 1) * 0.05);

    let weapFinalBase = 0;
    if (slot.weapId) {
        let w = WEAPONS_DB[slot.weapId];
        weapFinalBase = w.baseAtk * (1 + (player.inventory[slot.weapId] - 1) * 0.005);
    }
    
    let tAtkBonus = 1 + getTreasureBonus('atk');
    let adMult = getAdBuffMultiplier();
    
    let finalDmg = ((catFinalBase + weapFinalBase + player.upgrades.atk * 2) * tAtkBonus * adMult);
    
    // 武器アビリティ
    if (slot.weapId === '033') finalDmg *= 2;
    if (slot.weapId === '035') finalDmg *= 3;
    if (slot.weapId === '030' && Math.random() < 0.15) finalDmg *= 4;
    if (slot.weapId === '032' && Math.random() < 0.30) finalDmg *= 3;

    enemy.hp -= Math.floor(finalDmg);
    if (slot.weapId === '034' && Math.random() < 0.40) { enemy.hp -= Math.floor(finalDmg) * 3; }
    
    if (enemy.hp <= 0) { enemy.hp = 0; enemyKilled(); }
    updateUI();
}

function enemyKilled() {
    let adMult = getAdBuffMultiplier();
    let goldGet = (player.stage * 5 * (1 + getTreasureBonus('gold'))) * adMult;
    player.gold += goldGet;
    
    let finalDropChance = DROP_CHANCE * adMult;
    let diaGet = 0;
    if (Math.random() < finalDropChance) { 
        diaGet = Math.floor((5 + Math.floor(player.stage * 1.5)) * adMult); 
        player.diamond += diaGet; 
    }
    
    log(`💀 敵【${enemy.name}】を撃破！ 💰+${Math.floor(goldGet).toLocaleString()}G ${diaGet > 0 ? `💎+${diaGet.toLocaleString()}` : ''}`);
    player.stage++; spawnEnemy(); updateUI();
}

function initGame() {
    spawnEnemy();
    // 剣（1秒に1回）、銃（0.6秒に1回）、魔法（1.6秒に1回）の自動バトルタイマー
    setInterval(() => catAttack(0), 1000);
    setInterval(() => catAttack(1), 600);
    setInterval(() => catAttack(2), 1600);
    setInterval(updateUI, 250);
    setInterval(handleAdTimer, 1000);
}
window.onload = initGame;
</script>
</body>
</html>
