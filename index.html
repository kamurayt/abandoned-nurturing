<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>放置インフレゲーム - プロトタイプ</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; display: flex; justify-content: center; }
        #game-container { width: 400px; background-color: white; border: 2px solid #333; border-radius: 10px; padding: 10px; box-sizing: border-box; }
        
        /* 上部UI */
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        
        /* 敵エリア */
        #enemy-area { height: 150px; border: 3px solid #d32f2f; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 15px; background-color: #ffebee; }
        #enemy-hp-bar { width: 80%; height: 20px; background-color: #ddd; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        #enemy-hp-fill { width: 100%; height: 100%; background-color: #f44336; transition: width 0.1s; }
        
        /* 味方キャラエリア */
        .char-area { display: flex; justify-content: space-around; border: 2px solid #333; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .char-slot { width: 70px; height: 70px; border: 2px dashed #999; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; text-align: center; }
        .active-char { border: 2px solid #2196f3; background-color: #e3f2fd; font-weight: bold; }
        
        /* 強化ボタンエリア */
        .upgrade-area { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .upgrade-btn { width: 23%; height: 60px; border: 2px solid #333; border-radius: 10px; background-color: white; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .upgrade-btn:hover { background-color: #f0f0f0; }
        .upgrade-btn:disabled { background-color: #e0e0e0; color: #999; cursor: not-allowed; }
        
        /* 下部タブエリア */
        .tab-area { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 5px; }
        .tab-btn { width: 30%; height: 40px; border: 2px solid #333; border-radius: 20px; background-color: white; font-size: 12px; cursor: pointer; }
        
        /* ログ用 */
        #log-area { font-size: 12px; color: #666; height: 40px; overflow: hidden; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="top-bar">
        <div>メニュー</div>
        <div id="stage-display">ステージ 1 (0/5)</div>
        <div id="money-display">お金: 0</div>
    </div>

    <div id="enemy-area">
        <h2 style="margin:0;">てき (スライム)</h2>
        <div id="enemy-hp-text">HP: 50 / 50</div>
        <div id="enemy-hp-bar"><div id="enemy-hp-fill"></div></div>
    </div>
    
    <div id="log-area">ここに攻撃のログが出ます</div>

    <div class="char-area">
        <div id="char1-display" class="char-slot active-char">キャラ1<br>Dmg: 10</div>
        <div class="char-slot">キャラ2<br>(未編成)</div>
        <div class="char-slot">キャラ3<br>(未編成)</div>
    </div>

    <div class="upgrade-area">
        <button id="btn-atk" class="upgrade-btn" onclick="buyUpgrade('atk')">攻撃力<br>Lv.1<br>コスト: 10</button>
        <button id="btn-spd" class="upgrade-btn" onclick="buyUpgrade('spd')">攻撃速度<br>Lv.1<br>コスト: 15</button>
        <button id="btn-hit" class="upgrade-btn">命中<br>数値: 10<br>(未実装)</button>
        <button id="btn-money" class="upgrade-btn" onclick="buyUpgrade('money')">お金<br>Lv.1<br>コスト: 20</button>
    </div>

    <div class="tab-area">
        <button class="tab-btn">キャラ一覧</button>
        <button class="tab-btn">装備一覧</button>
        <button class="tab-btn">転生</button>
        <button class="tab-btn">お宝</button>
        <button class="tab-btn">ガチャ</button>
        <button class="tab-btn">ショップ</button>
    </div>
</div>

<script>
    // --- データの初期設定 ---
    let money = 0;
    let stage = 1;
    let killsInStage = 0;
    
    let enemy = { maxHp: 50, hp: 50 };

    // キャラ1のステータス
    let char1 = { 
        baseAttack: 10, 
        attackMultiplier: 1.0, // 攻撃力倍率
        attackSpeed: 1.0       // 攻撃速度（1秒間の攻撃回数）
    };
    let weapon = { baseAttack: 0 };

    // ★新設：アップグレードごとのレベルと初期コスト、倍率の上昇値
    let upgrades = {
        atk:   { lv: 1, cost: 10, scale: 1.2, bonus: 0.2 },   // 1レベルごとに倍率+0.2 (20%アップ)
        spd:   { lv: 1, cost: 15, scale: 1.25, bonus: 0.1 },  // 1レベルごとに速度+0.1 (秒間攻撃回数アップ)
        money: { lv: 1, cost: 20, scale: 1.3, bonus: 0.5 },   // 1レベルごとに獲得お金倍率+0.5
    };
    let moneyMultiplier = 1.0; // お金獲得のトータル倍率

    // タイマーの管理用変数
    let attackIntervalId = null;

    // UI要素の取得
    const uiEnemyHpText = document.getElementById('enemy-hp-text');
    const uiEnemyHpFill = document.getElementById('enemy-hp-fill');
    const uiMoneyDisplay = document.getElementById('money-display');
    const uiLogArea = document.getElementById('log-area');
    const uiStageDisplay = document.getElementById('stage-display');
    const uiChar1Display = document.getElementById('char1-display');
    
    const uiBtnAtk = document.getElementById('btn-atk');
    const uiBtnSpd = document.getElementById('btn-spd');
    const uiBtnMoney = document.getElementById('btn-money');

    // --- 自動攻撃の処理 ---
    function autoAttack() {
        // 現在の最終攻撃力を計算
        let currentDamage = Math.floor((char1.baseAttack + weapon.baseAttack) * char1.attackMultiplier);
        
        enemy.hp -= currentDamage;
        uiLogArea.innerText = `キャラ1が ${currentDamage} のダメージを与えた！`;

        if (enemy.hp <= 0) {
            enemyDefeated();
        }
        updateUI();
    }

    // 敵を倒したときの処理
    function enemyDefeated() {
        // お金計算：基礎額(10 * ステージ) × お金倍率
        let baseEarned = 10 * stage;
        let earnedMoney = Math.floor(baseEarned * moneyMultiplier);
        money += earnedMoney;
        uiLogArea.innerText = `敵を倒した！ お金を ${earnedMoney} 獲得！`;

        killsInStage++;
        if (killsInStage >= 5) {
            stage++;
            killsInStage = 0;
        }

        // 敵のHPをインフレさせる
        enemy.maxHp = Math.floor(50 * Math.pow(1.35, stage - 1));
        enemy.hp = enemy.maxHp;
    }

    // ★新設：アップグレードボタンを押したときの処理
    function buyUpgrade(type) {
        let up = upgrades[type];
        
        // お金が足りているかチェック
        if (money >= up.cost) {
            money -= up.cost; // お金を消費
            up.lv++;          // レベルアップ
            
            // コストをインフレさせる（例：前回のコスト×倍率）
            up.cost = Math.floor(up.cost * up.scale);

            // 各ステータスにレベルアップの恩恵を反映
            if (type === 'atk') {
                char1.attackMultiplier = 1.0 + (up.lv - 1) * up.bonus;
            } else if (type === 'spd') {
                char1.attackSpeed = 1.0 + (up.lv - 1) * up.bonus;
                resetAttackTimer(); // 速度が変わったのでタイマーを再設定
            } else if (type === 'money') {
                moneyMultiplier = 1.0 + (up.lv - 1) * up.bonus;
            }

            uiLogArea.innerText = `アップグレード成功！現在のステータスが強化されました。`;
            updateUI();
        }
    }

    // ★新設：攻撃速度が変わったときにタイマーをリセットする処理
    function resetAttackTimer() {
        if (attackIntervalId) clearInterval(attackIntervalId);
        // 新しい攻撃速度でタイマーを再始動
        attackIntervalId = setInterval(autoAttack, 1000 / char1.attackSpeed);
    }

    // 画面の更新
    function updateUI() {
        uiMoneyDisplay.innerText = `お金: ${money}`;
        uiStageDisplay.innerText = `ステージ ${stage} (${killsInStage}/5)`;
        
        let displayHp = Math.max(0, enemy.hp);
        uiEnemyHpText.innerText = `HP: ${displayHp} / ${enemy.maxHp}`;
        let hpPercent = (displayHp / enemy.maxHp) * 100;
        uiEnemyHpFill.style.width = `${hpPercent}%`;

        // キャラクターの現在の攻撃力を更新
        let currentDamage = Math.floor((char1.baseAttack + weapon.baseAttack) * char1.attackMultiplier);
        uiChar1Display.innerHTML = `キャラ1<br>Dmg: ${currentDamage}<br>(Spd: ${char1.attackSpeed.toFixed(1)})`;

        // ボタンのテキストと「お金が足りないときは押せない」処理
        uiBtnAtk.innerHTML = `攻撃力<br>Lv.${upgrades.atk.lv}<br>コスト: ${upgrades.atk.cost}`;
        uiBtnAtk.disabled = (money < upgrades.atk.cost);

        uiBtnSpd.innerHTML = `攻撃速度<br>Lv.${upgrades.spd.lv}<br>コスト: ${upgrades.spd.cost}`;
        uiBtnSpd.disabled = (money < upgrades.spd.cost);

        uiBtnMoney.innerHTML = `お金<br>Lv.${upgrades.money.lv}<br>コスト: ${upgrades.money.cost}`;
        uiBtnMoney.disabled = (money < upgrades.money.cost);
    }

    // 最初のタイマー起動
    resetAttackTimer();
    updateUI();
</script>
</body>
</html>
