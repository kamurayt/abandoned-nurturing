<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>放置インフレゲーム - プロトタイプ</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; display: flex; justify-content: center; }
        #game-container { width: 400px; background-color: white; border: 2px solid #333; border-radius: 10px; padding: 10px; box-sizing: border-box; }
        
        /* 上部UI */
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        
        /* 敵エリア */
        #enemy-area { height: 150px; border: 3px solid #d32f2f; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 5px; background-color: #ffebee; }
        #enemy-hp-bar { width: 80%; height: 20px; background-color: #ddd; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        #enemy-hp-fill { width: 100%; height: 100%; background-color: #f44336; transition: width 0.1s; }
        
        /* 命中情報の表示 */
        #hit-requirement-display { text-align: center; font-size: 11px; color: #d32f2f; font-weight: bold; margin-bottom: 10px; }
        
        /* 味方キャラエリア */
        .char-area { display: flex; justify-content: space-around; border: 2px solid #333; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .char-slot { width: 70px; height: 70px; border: 2px dashed #999; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; text-align: center; }
        .active-char { border: 2px solid #2196f3; background-color: #e3f2fd; font-weight: bold; }
        
        /* ログ用 */
        #log-area { font-size: 12px; color: #666; height: 40px; overflow: hidden; text-align: center; margin-bottom: 10px; font-weight: bold; }
        .log-miss { color: #f44336; }
        .log-hit { color: #2196f3; }
        .log-gacha { color: #e91e63; } /* ガチャ用のログ色 */

        /* ★新設：下部コンテンツエリア（タブで切り替わる中身） */
        .content-panel { border: 2px solid #333; border-radius: 10px; padding: 10px; height: 140px; margin-bottom: 15px; overflow-y: auto; background-color: #fafafa; }
        .panel-content { display: none; } /* 基本は非表示 */
        .panel-content.active { display: block; } /* activeクラスがついたものだけ表示 */

        /* 強化ボタンエリア（コンテンツパネルの中に入りました） */
        .upgrade-area { display: flex; justify-content: space-between; }
        .upgrade-btn { width: 23%; height: 60px; border: 2px solid #333; border-radius: 10px; background-color: white; font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .upgrade-btn:hover { background-color: #f0f0f0; }
        .upgrade-btn:disabled { background-color: #e0e0e0; color: #999; cursor: not-allowed; }
        
        /* 下部タブエリア */
        .tab-area { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 5px; }
        .tab-btn { width: 30%; height: 40px; border: 2px solid #333; border-radius: 20px; background-color: white; font-size: 12px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background-color: #333; color: white; } /* 選択中のタブを目立たせる */

        /* ガチャ・装備画面用のスタイル */
        .gacha-box { text-align: center; padding-top: 10px; }
        .gacha-main-btn { padding: 10px 20px; font-size: 14px; font-weight: bold; background-color: #e91e63; color: white; border: 2px solid #333; border-radius: 5px; cursor: pointer; }
        .gacha-main-btn:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="top-bar">
        <div>メニュー</div>
        <div id="stage-display">ステージ 1 (0/5)</div>
        <div id="money-display">お金: 0</div>
    </div>

    <div id="enemy-area">
        <h2 style="margin:0;">てき (スライム)</h2>
        <div id="enemy-hp-text">HP: 50 / 50</div>
        <div id="enemy-hp-bar"><div id="enemy-hp-fill"></div></div>
    </div>
    
    <div id="hit-requirement-display">このステージの必要命中値: 10</div>
    
    <div id="log-area">ここに攻撃のログが出ます</div>

    <div class="char-area">
        <div id="char1-display" class="char-slot active-char">キャラ1<br>Dmg: 10</div>
        <div class="char-slot">キャラ2<br>(未編成)</div>
        <div class="char-slot">キャラ3<br>(未編成)</div>
    </div>

    <div class="content-panel">
        
        <div id="content-upgrade" class="panel-content active">
            <div class="upgrade-area">
                <button id="btn-atk" class="upgrade-btn" onclick="buyUpgrade('atk')">攻撃力<br>Lv.1<br>コスト: 10</button>
                <button id="btn-spd" class="upgrade-btn" onclick="buyUpgrade('spd')">攻撃速度<br>Lv.1<br>コスト: 15</button>
                <button id="btn-hit" class="upgrade-btn" onclick="buyUpgrade('hit')">命中<br>数値: 10<br>コスト: 12</button>
                <button id="btn-money" class="upgrade-btn" onclick="buyUpgrade('money')">お金<br>Lv.1<br>コスト: 20</button>
            </div>
        </div>

        <div id="content-chars" class="panel-content">
            <p style="text-align:center; color:#999; font-size:14px; margin-top:30px;">キャラクター一覧（今後実装予定）</p>
        </div>

        <div id="content-equip" class="panel-content">
            <h4 style="margin:0 0 5px 0;">現在の装備</h4>
            <div id="current-weapon-display" style="font-size:13px; font-weight:bold; color:#2196f3;">現在の武器: なし (攻撃力+0)</div>
            <p style="font-size:11px; color:#666; margin-top:5px;">※ガチャでより強い武器を引くと自動で装備されます。</p>
        </div>

        <div id="content-reborn" class="panel-content">
            <p style="text-align:center; color:#999; font-size:14px; margin-top:30px;">転生システム（今後実装予定）</p>
        </div>

        <div id="content-treasure" class="panel-content">
            <p style="text-align:center; color:#999; font-size:14px; margin-top:30px;">お宝コレクション（今後実装予定）</p>
        </div>

        <div id="content-gacha" class="panel-content">
            <div class="gacha-box">
                <div style="font-size:12px; margin-bottom:8px; font-weight:bold;">🎁 武器ガチャ (1回: お金 100)</div>
                <button id="btn-gacha-weapon" class="gacha-main-btn" onclick="drawWeaponGacha()">ガチャを引く！</button>
                <div style="font-size:10px; color:#666; margin-top:5px;">確率: 銅(70%) / 鉄(25%) / 伝説(5%)</div>
            </div>
        </div>

        <div id="content-shop" class="panel-content">
            <p style="text-align:center; color:#999; font-size:14px; margin-top:30px;">ショップ（今後実装予定）</p>
        </div>

    </div>

    <div class="tab-area">
        <button id="tab-btn-upgrade" class="tab-btn active" onclick="switchTab('upgrade')">強化</button>
        <button class="tab-btn" onclick="switchTab('chars')">キャラ一覧</button>
        <button class="tab-btn" onclick="switchTab('equip')">装備一覧</button>
        <button class="tab-btn" onclick="switchTab('reborn')">転生</button>
        <button class="tab-btn" onclick="switchTab('treasure')">お宝</button>
        <button class="tab-btn" onclick="switchTab('gacha')">ガチャ</button>
        <button class="tab-btn" onclick="switchTab('shop')">ショップ</button>
    </div>
</div>

<script>
    // --- データの初期設定 ---
    let money = 0;
    let stage = 1;
    let killsInStage = 0;
    
    let enemy = { maxHp: 50, hp: 50 };

    // キャラ1のステータス
    let char1 = { baseAttack: 10, attackMultiplier: 1.0, attackSpeed: 1.0, hitValue: 10 };
    
    // ★新設：武器の設定（初期状態は「なし」で攻撃力0）
    let currentWeapon = { name: "なし", attack: 0 };

    // ★新設：ガチャから出る武器のデータリスト
    const weaponList = [
        { name: "銅のつるぎ", attack: 15, weight: 70 },   // 70%の確率で出る
        { name: "鉄のつるぎ", attack: 60, weight: 25 },   // 25%の確率で出る
        { name: "伝説の聖剣", attack: 300, weight: 5 }     // 5%の確率で出る（超インフレ！）
    ];
    let gachaCost = 100; // ガチャの値段

    let upgrades = {
        atk:   { lv: 1, cost: 10, scale: 1.2, bonus: 0.2 },   
        spd:   { lv: 1, cost: 15, scale: 1.25, bonus: 0.1 },  
        hit:   { lv: 1, cost: 12, scale: 1.2, bonus: 5 },    
        money: { lv: 1, cost: 20, scale: 1.3, bonus: 0.5 },   
    };
    let moneyMultiplier = 1.0; 

    let attackIntervalId = null;

    // UI要素の取得
    const uiEnemyHpText = document.getElementById('enemy-hp-text');
    const uiEnemyHpFill = document.getElementById('enemy-hp-fill');
    const uiMoneyDisplay = document.getElementById('money-display');
    const uiLogArea = document.getElementById('log-area');
    const uiStageDisplay = document.getElementById('stage-display');
    const uiChar1Display = document.getElementById('char1-display');
    const uiHitReqDisplay = document.getElementById('hit-requirement-display');
    const uiCurrentWeapon = document.getElementById('current-weapon-display');
    
    const uiBtnAtk = document.getElementById('btn-atk');
    const uiBtnSpd = document.getElementById('btn-spd');
    const uiBtnHit = document.getElementById('btn-hit');
    const uiBtnMoney = document.getElementById('btn-money');
    const uiBtnGachaWeapon = document.getElementById('btn-gacha-weapon');

    function getRequiredHit() {
        return 10 + (stage - 1) * 15;
    }

    // --- 自動攻撃の処理 ---
    function autoAttack() {
        let reqHit = getRequiredHit();
        let isHit = (char1.hitValue >= reqHit) ? true : (Math.random() < 0.3);

        if (isHit) {
            // ★進化：ダメージ計算に「currentWeapon.attack」がしっかり足されるようになりました！
            let currentDamage = Math.floor((char1.baseAttack + currentWeapon.attack) * char1.attackMultiplier);
            enemy.hp -= currentDamage;
            
            uiLogArea.innerHTML = `<span class="log-hit">HIT!</span> キャラ1が ${currentDamage} のダメージを与えた！`;

            if (enemy.hp <= 0) {
                enemyDefeated();
            }
        } else {
            uiLogArea.innerHTML = `<span class="log-miss">MISS!</span> 命中が足りない！（確率30%で失敗）`;
        }

        updateUI();
    }

    function enemyDefeated() {
        let baseEarned = 10 * stage;
        let earnedMoney = Math.floor(baseEarned * moneyMultiplier);
        money += earnedMoney;
        uiLogArea.innerText = `敵を倒した！ お金を ${earnedMoney} 獲得！`;

        killsInStage++;
        if (killsInStage >= 5) {
            stage++;
            killsInStage = 0;
        }

        enemy.maxHp = Math.floor(50 * Math.pow(1.35, stage - 1));
        enemy.hp = enemy.maxHp;
    }

    // ★新設：武器ガチャを引くロジック
    function drawWeaponGacha() {
        if (money >= gachaCost) {
            money -= gachaCost; // お金を消費

            // 確率に基づいたランダム抽選
            let rand = Math.random() * 100;
            let selectedWeapon = weaponList[0]; // デフォルトは銅

            if (rand < 5) {
                selectedWeapon = weaponList[2]; // 5%で伝説
            } else if (rand < 30) {
                selectedWeapon = weaponList[1]; // 25%で鉄 (5 + 25 = 30)
            } else {
                selectedWeapon = weaponList[0]; // 70%で銅
            }

            // 引いた武器が、今の武器より強ければ自動で装備！
            let equipText = "";
            if (selectedWeapon.attack > currentWeapon.attack) {
                currentWeapon = selectedWeapon;
                equipText = "（自動で装備しました！）";
            } else {
                equipText = "（今の武器の方が強いためキープ）";
            }

            uiLogArea.innerHTML = `<span class="log-gacha">🎁 ガチャ結果:</span> 「${selectedWeapon.name}(攻撃力+${selectedWeapon.attack})」を獲得！ ${equipText}`;
            updateUI();
        }
    }

    // ★新設：画面下のタブを切り替えるロジック
    function switchTab(tabName) {
        // すべてのコンテンツを一回非表示にする
        const contents = document.querySelectorAll('.panel-content');
        contents.forEach(c => c.classList.remove('active'));

        // すべてのタブボタンの選択中状態（active）を解除する
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(t => t.classList.remove('active'));

        // クリックされたターゲットのコンテンツを表示する
        document.getElementById(`content-${tabName}`).classList.add('active');
        
        // イベント元のボタンを特定するのが難しいため、簡易的に「強化」タブだけボタンのactive切り替えを例示（動作には影響ありません）
        if(tabName === 'upgrade') {
            document.getElementById('tab-btn-upgrade').classList.add('active');
        }
    }

    // アップグレードボタン処理
    function buyUpgrade(type) {
        let up = upgrades[type];
        if (money >= up.cost) {
            money -= up.cost; 
            up.lv++;          
            up.cost = Math.floor(up.cost * up.scale);

            if (type === 'atk') char1.attackMultiplier = 1.0 + (up.lv - 1) * up.bonus;
            else if (type === 'spd') { char1.attackSpeed = 1.0 + (up.lv - 1) * up.bonus; resetAttackTimer(); }
            else if (type === 'hit') char1.hitValue = 10 + (up.lv - 1) * up.bonus;
            else if (type === 'money') moneyMultiplier = 1.0 + (up.lv - 1) * up.bonus;

            uiLogArea.innerText = `アップグレード成功！`;
            updateUI();
        }
    }

    function resetAttackTimer() {
        if (attackIntervalId) clearInterval(attackIntervalId);
        attackIntervalId = setInterval(autoAttack, 1000 / char1.attackSpeed);
    }

    // 画面の更新
    function updateUI() {
        uiMoneyDisplay.innerText = `お金: ${money}`;
        uiStageDisplay.innerText = `ステージ ${stage} (${killsInStage}/5)`;
        
        let displayHp = Math.max(0, enemy.hp);
        uiEnemyHpText.innerText = `HP: ${displayHp} / ${enemy.maxHp}`;
        let hpPercent = (displayHp / enemy.maxHp) * 100;
        uiEnemyHpFill.style.width = `${hpPercent}%`;

        let reqHit = getRequiredHit();
        uiHitReqDisplay.innerText = `このステージの必要命中値: ${reqHit} (あなたの命中: ${char1.hitValue})`;

        // キャラクターの総合ダメージ表示に武器の威力を反映
        let currentDamage = Math.floor((char1.baseAttack + currentWeapon.attack) * char1.attackMultiplier);
        uiChar1Display.innerHTML = `キャラ1<br>Dmg: ${currentDamage}<br>Hit: ${char1.hitValue}`;

        // 装備一覧タブの中身も更新
        uiCurrentWeapon.innerText = `現在の武器: ${currentWeapon.name} (攻撃力+${currentWeapon.attack})`;

        // 各種ボタンのロック・解除チェック
        uiBtnAtk.disabled = (money < upgrades.atk.cost);
        uiBtnSpd.disabled = (money < upgrades.spd.cost);
        uiBtnHit.disabled = (money < upgrades.hit.cost);
        uiBtnMoney.disabled = (money < upgrades.money.cost);
        
        // ガチャボタンのお金チェック
        uiBtnGachaWeapon.disabled = (money < gachaCost);
    }

    resetAttackTimer();
    updateUI();
</script>
</body>
</html>
