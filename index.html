<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ネコ銃士RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #1a1a2e;
            --bg-card: #16213e;
            --bg-panel: #0f3460;
            --accent-yellow: #f5a623;
            --accent-green: #4ecca3;
            --accent-red: #e94560;
            --accent-blue: #00b4d8;
            --accent-purple: #c77dff;
            --text-main: #eaeaea;
            --text-dim: #8899aa;
            --border-glow: rgba(245,166,35,0.4);
            --rare1: #aaaaaa;
            --rare2: #4ecca3;
            --rare3: #00b4d8;
            --rare4: #c77dff;
            --rare5: #f5a623;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background: var(--bg-main);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(15,52,96,0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(201,125,255,0.08) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 0;
        }

        .game-wrapper {
            max-width: 480px;
            margin: 0 auto;
            padding: 8px;
            position: relative;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: linear-gradient(135deg, #0f3460, #16213e);
            border-radius: 14px;
            border: 1px solid rgba(245,166,35,0.3);
            margin-bottom: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .header-title {
            font-size: 18px;
            font-weight: 900;
            color: var(--accent-yellow);
            text-shadow: 0 0 12px rgba(245,166,35,0.5);
            letter-spacing: 1px;
        }
        .header-title span { color: var(--text-main); }
        .menu-btn {
            background: linear-gradient(135deg, #f5a623, #e08b00);
            color: #1a1a2e;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .menu-btn:hover { transform: scale(1.05); box-shadow: 0 0 12px rgba(245,166,35,0.6); }

        /* ===== STAGE INFO ===== */
        .stage-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-card);
            border-radius: 10px;
            padding: 8px 14px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .stage-label {
            font-size: 16px;
            font-weight: 900;
            color: var(--accent-yellow);
            text-shadow: 0 0 8px rgba(245,166,35,0.4);
        }
        .hit-req {
            font-size: 11px;
            color: var(--text-dim);
        }
        .hit-req span { color: var(--accent-green); font-weight: 700; }

        /* ===== RESOURCES ===== */
        .resources {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        .res-chip {
            flex: 1;
            background: var(--bg-card);
            border-radius: 10px;
            padding: 7px 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.07);
            font-size: 11px;
            color: var(--text-dim);
        }
        .res-chip .res-val {
            display: block;
            font-size: 13px;
            font-weight: 800;
            color: var(--text-main);
            margin-top: 1px;
        }
        .res-chip.gold .res-val { color: var(--accent-yellow); }
        .res-chip.diamond .res-val { color: var(--accent-blue); }
        .res-chip.prestige .res-val { color: var(--accent-purple); }

        /* ===== ENEMY ZONE ===== */
        .enemy-zone {
            background: linear-gradient(180deg, #0f3460 0%, #16213e 100%);
            border-radius: 16px;
            border: 1px solid rgba(233,69,96,0.3);
            padding: 16px;
            margin-bottom: 8px;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 200px;
        }
        .enemy-zone::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(233,69,96,0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        .enemy-img-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 8px;
        }
        .enemy-img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            image-rendering: pixelated;
            filter: drop-shadow(0 4px 12px rgba(233,69,96,0.4));
            animation: enemyFloat 3s ease-in-out infinite;
        }
        @keyframes enemyFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .enemy-name {
            font-size: 15px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .hp-bar-wrap {
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            height: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 4px;
        }
        .hp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b8a);
            border-radius: 10px;
            transition: width 0.12s ease;
            box-shadow: 0 0 8px rgba(233,69,96,0.5);
        }
        .hp-text {
            font-size: 11px;
            color: var(--text-dim);
            font-weight: 700;
        }

        /* ===== DAMAGE LOG ===== */
        .dmg-flash {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px #f5a623, 2px 2px 0 #e94560;
            pointer-events: none;
            opacity: 0;
            z-index: 10;
        }
        .dmg-flash.show {
            animation: dmgPop 0.6s ease-out forwards;
        }
        @keyframes dmgPop {
            0% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.2); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-40px) scale(0.8); }
        }

        /* ===== AD BUFF ===== */
        .ad-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #1a2a1a, #1e3a1e);
            border: 1px solid rgba(78,204,163,0.3);
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 8px;
            font-size: 11px;
        }
        .ad-info { line-height: 1.5; }
        .ad-status { color: var(--accent-green); font-weight: 800; font-size: 12px; }
        .ad-timer { color: var(--text-dim); font-size: 10px; }
        .ad-btns { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
        .ad-watch-btn {
            background: linear-gradient(135deg, var(--accent-green), #2db88a);
            color: #1a2a1a;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 10px;
            cursor: pointer;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            transition: transform 0.1s;
        }
        .ad-watch-btn:hover { transform: scale(1.05); }
        .no-ads-label { font-size: 9px; color: var(--text-dim); cursor: pointer; }
        .no-ads-label input { cursor: pointer; }

        /* ===== SECTION TITLE ===== */
        .section-title {
            font-size: 12px;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 12px 0 6px 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }

        /* ===== PARTY GRID ===== */
        .party-grid {
            display: flex;
            gap: 6px;
            margin-bottom: 4px;
        }
        .party-card {
            flex: 1;
            background: var(--bg-card);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .party-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .party-card.active {
            border-color: var(--accent-green);
            box-shadow: 0 0 12px rgba(78,204,163,0.25);
        }
        .party-card.empty {
            border: 1.5px dashed rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 170px;
            cursor: default;
        }
        .party-card.empty:hover { transform: none; box-shadow: none; }
        .empty-label { font-size: 11px; color: var(--text-dim); line-height: 1.6; }

        .card-rarity-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 12px 12px 0 0;
        }
        .rare-1 { background: var(--rare1); }
        .rare-2 { background: var(--rare2); }
        .rare-3 { background: var(--rare3); }
        .rare-4 { background: var(--rare4); }
        .rare-5 { background: linear-gradient(90deg, var(--rare5), #ff6b35, var(--rare5)); }

        .card-type-badge {
            font-size: 9px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 20px;
            margin-bottom: 4px;
            display: inline-block;
        }
        .badge-sword { background: rgba(233,69,96,0.2); color: #ff6b8a; border: 1px solid rgba(233,69,96,0.3); }
        .badge-gun { background: rgba(0,180,216,0.2); color: #00b4d8; border: 1px solid rgba(0,180,216,0.3); }
        .badge-magic { background: rgba(199,125,255,0.2); color: #c77dff; border: 1px solid rgba(199,125,255,0.3); }

        .cat-img-box {
            width: 60px;
            height: 60px;
            margin: 0 auto 4px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .cat-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
        }
        .card-name {
            font-size: 9px;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
            padding: 0 2px;
        }
        .weapon-img-box {
            width: 40px;
            height: 40px;
            margin: 0 auto 2px;
            background: rgba(255,255,255,0.04);
            border-radius: 6px;
            border: 1px dashed rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .weapon-img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
        .weapon-name-text {
            font-size: 8px;
            color: var(--text-dim);
            line-height: 1.2;
            min-height: 18px;
            padding: 0 2px;
        }
        .atk-val {
            font-size: 11px;
            font-weight: 900;
            color: var(--accent-red);
            margin-top: 2px;
        }

        /* ===== UPGRADE BUTTONS ===== */
        .upgrade-row {
            display: flex;
            gap: 6px;
            align-items: stretch;
        }
        .upgrade-btn {
            flex: 1;
            background: var(--bg-card);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px 6px;
            cursor: pointer;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            color: var(--text-main);
            font-size: 11px;
            font-weight: 700;
            line-height: 1.4;
            transition: border-color 0.2s, background 0.2s, transform 0.1s;
            text-align: center;
        }
        .upgrade-btn:hover:not(:disabled) {
            background: rgba(245,166,35,0.1);
            border-color: var(--accent-yellow);
            transform: scale(1.02);
        }
        .upgrade-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .upgrade-btn .cost { color: var(--accent-yellow); font-size: 10px; }
        .upgrade-btn .lv { color: var(--text-dim); font-size: 9px; }

        .hit-status-box {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 8px 10px;
            text-align: right;
            font-size: 11px;
            border: 1.5px solid rgba(255,255,255,0.07);
            line-height: 1.6;
            min-width: 85px;
        }
        .hit-status-box .hit-num { color: var(--accent-green); font-weight: 800; }
        .hit-status-box .hit-rate { color: var(--accent-blue); font-weight: 800; }

        /* ===== ACTION BUTTONS ===== */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 6px;
        }
        .action-btn {
            border: none;
            border-radius: 10px;
            padding: 10px 6px;
            cursor: pointer;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            font-weight: 800;
            font-size: 11px;
            line-height: 1.4;
            transition: transform 0.12s, box-shadow 0.12s;
            position: relative;
            overflow: hidden;
        }
        .action-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%;
            height: 100%;
            background: rgba(255,255,255,0.15);
            transform: skewX(-20deg);
            transition: left 0.3s;
        }
        .action-btn:hover::before { left: 150%; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.4); }
        .action-btn:active { transform: scale(0.97); }
        .btn-gacha-weapon { background: linear-gradient(135deg, #e08b00, #f5a623); color: #1a1a2e; }
        .btn-gacha-cat { background: linear-gradient(135deg, #0089a8, #00b4d8); color: #fff; }
        .btn-prestige { background: linear-gradient(135deg, #5a00a8, #c77dff); color: #fff; }
        .btn-treasure { background: linear-gradient(135deg, #1a3a1a, #2a5a2a); color: var(--accent-green); border: 1px solid rgba(78,204,163,0.3); }
        .action-btn .sub { font-size: 9px; opacity: 0.8; display: block; margin-top: 1px; }

        .gacha-result {
            text-align: center;
            font-size: 12px;
            font-weight: 800;
            min-height: 18px;
            color: var(--accent-yellow);
            text-shadow: 0 0 8px rgba(245,166,35,0.4);
            margin: 4px 0;
        }

        /* ===== TREASURE BOX ===== */
        .treasure-row {
            display: flex;
            gap: 6px;
            align-items: stretch;
        }
        .treasure-display {
            flex: 1;
            background: var(--bg-card);
            border: 1px dashed rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 6px 8px;
            font-size: 10px;
            color: var(--text-dim);
            max-height: 60px;
            overflow-y: auto;
            line-height: 1.6;
        }

        /* ===== BATTLE LOG ===== */
        .battle-log {
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            height: 100px;
            overflow-y: scroll;
            padding: 8px 10px;
            font-size: 10px;
            color: var(--text-dim);
            text-align: left;
            margin-top: 10px;
            line-height: 1.7;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }
        .battle-log .log-hit { color: var(--accent-green); }
        .battle-log .log-kill { color: var(--accent-yellow); font-weight: 700; }
        .battle-log .log-prestige { color: var(--accent-purple); font-weight: 700; }

        /* ===== OVERLAY / POPUP ===== */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .overlay.active { display: flex; }
        .pop-box {
            background: var(--bg-panel);
            border: 1.5px solid rgba(245,166,35,0.4);
            border-radius: 18px;
            padding: 20px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 0 40px rgba(245,166,35,0.15);
            animation: popIn 0.2s ease;
        }
        @keyframes popIn {
            from { transform: scale(0.92); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .pop-title {
            font-size: 16px;
            font-weight: 900;
            color: var(--accent-yellow);
            border-bottom: 1px solid rgba(245,166,35,0.25);
            padding-bottom: 10px;
            margin-bottom: 12px;
        }
        .pop-body { font-size: 12px; line-height: 1.8; color: var(--text-main); }
        .pop-body strong { color: var(--accent-green); }
        .close-btn {
            width: 100%;
            margin-top: 14px;
            background: rgba(233,69,96,0.2);
            border: 1px solid rgba(233,69,96,0.4);
            color: var(--accent-red);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            font-weight: 800;
            font-size: 13px;
            transition: background 0.2s;
        }
        .close-btn:hover { background: rgba(233,69,96,0.35); }

        /* ===== RARITY STARS ===== */
        .stars { letter-spacing: -1px; }
        .stars.r1 { color: var(--rare1); }
        .stars.r2 { color: var(--rare2); }
        .stars.r3 { color: var(--rare3); }
        .stars.r4 { color: var(--rare4); }
        .stars.r5 { color: var(--rare5); }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    </style>
</head>
<body>
<div class="game-wrapper">

    <!-- HEADER -->
    <div class="header">
        <div class="header-title">🐱 ネコ<span>銃士</span>RPG</div>
        <button class="menu-btn" onclick="openMenu()">📋 MENU</button>
    </div>

    <!-- AD BUFF -->
    <div class="ad-banner">
        <div class="ad-info">
            📺 広告バフ：<span class="ad-status" id="ad-buff-text">OFF</span><br>
            <span class="ad-timer" id="ad-timer-text">動画視聴で3分間【全効果3倍】</span>
        </div>
        <div class="ad-btns">
            <button class="ad-watch-btn" onclick="watchAd()">▶ 動画でバフON</button>
            <label class="no-ads-label"><input type="checkbox" id="no-ads-cheat" onchange="toggleNoAds()"> 👑 広告なし(課金)</label>
        </div>
    </div>

    <!-- STAGE + RESOURCES -->
    <div class="stage-bar">
        <div class="stage-label" id="stage-display">STAGE 1</div>
        <div class="hit-req">命中必要値: <span id="hit-requirement">0</span> ／ 自分: <span id="total-hit-val">0</span> (<span id="current-hit-rate">100</span>%)</div>
    </div>

    <div class="resources">
        <div class="res-chip gold">💰 ゴールド<span class="res-val" id="res-gold">0</span></div>
        <div class="res-chip diamond">💎 ダイヤ<span class="res-val" id="res-diamond">0</span></div>
        <div class="res-chip prestige">🌀 転生Pt<span class="res-val" id="res-prestige">0</span></div>
    </div>

    <!-- ENEMY ZONE -->
    <div class="enemy-zone">
        <div class="dmg-flash" id="dmg-flash">0</div>
        <div class="enemy-img-wrap">
            <img id="enemy-main-img" src="001.png" class="enemy-img" alt="敵">
        </div>
        <div class="enemy-name" id="enemy-name">スライム</div>
        <div class="hp-bar-wrap"><div class="hp-bar-fill" id="enemy-hp-bar" style="width:100%"></div></div>
        <div class="hp-text" id="enemy-hp-text">HP: 100 / 100</div>
    </div>

    <!-- PARTY -->
    <div class="section-title">⚔️ 出撃パーティ</div>
    <div class="party-grid">
        <div class="party-card active" id="card-slot-1" onclick="clickSlot(0)">
            <div class="card-rarity-bar rare-1" id="rarity-bar-1"></div>
            <div class="card-type-badge badge-sword" id="badge-1">剣</div>
            <div class="cat-img-box"><img src="002.png" class="cat-img" id="cat-main-img-1"></div>
            <div class="card-name" id="name-cat-1">見習い茶ネコ</div>
            <div class="weapon-img-box"><img id="weap-img-cat-1" class="weapon-img" src="021.png"></div>
            <div class="weapon-name-text" id="weap-cat-1">木の剣</div>
            <div class="atk-val">ATK:<span id="atk-cat-1">10</span></div>
        </div>
        <div class="party-card empty" id="card-slot-2" onclick="clickSlot(1)"><div class="empty-label">🔒 銃ネコ枠<br>未解放</div></div>
        <div class="party-card empty" id="card-slot-3" onclick="clickSlot(2)"><div class="empty-label">🔒 魔法ネコ枠<br>未解放</div></div>
    </div>

    <!-- UPGRADES -->
    <div class="section-title">💪 ゴールド強化</div>
    <div class="upgrade-row">

<script>
// ===== マスターDB =====
const ENEMIES_DB = {

const CATS_DB = {

const WEAPONS_DB = {
    '021': { name: '木の剣',           type: '剣',   baseAtk: 5,      img: '021.png', rare: 1 },
    '022': { name: '木のパチンコ',     type: '銃',   baseAtk: 4,      img: '022.png', rare: 1 },

    '026': { name: '銅の杖',           type: '魔法', baseAtk: 90,     img: '026.png', rare: 2 },

    '028': { name: '鉄の銃',           type: '銃',   baseAtk: 400,    img: '028.png', rare: 3 },
    '029': { name: '鉄の杖',           type: '魔法', baseAtk: 800,    img: '029.png', rare: 3 },
    '030': { name: 'オーラを放つ剣',   type: '剣',   baseAtk: 6000,   img: '030.png', rare: 4 },
    '031': { name: 'オーラを放つ銃',   type: '銃',   baseAtk: 4500,   img: '031.png', rare: 4 },
    '032': { name: 'オーラを放つ杖',   type: '魔法', baseAtk: 9000,   img: '032.png', rare: 4 },
    '033': { name: '覇王の剣',         type: '剣',   baseAtk: 70000,  img: '033.png', rare: 5 },
    '034': { name: '覇王の銃',         type: '銃',   baseAtk: 55000,  img: '034.png', rare: 5 },
    '035': { name: '覇王の杖',         type: '魔法', baseAtk: 120000, img: '035.png', rare: 5 }
};

const TREASURES = {
    't1': { name: '錆びた手鏡',     type: 'atk',   val: 0.05 },
    't2': { name: '旅人の財布',     type: 'gold',  val: 0.05 },
    't3': { name: '古びた虫眼鏡',   type: 'hit_p', val: 0.02 },
    't4': { name: '魔導師の書',     type: 'pt',    val: 0.20 },
    't5': { name: 'インフレの刻印', type: 'pt',    val: 1.00 }
};

// ===== ゲーム状態 =====
let player = {
    gold: 0, diamond: 0, prestigePt: 0, stage: 1,
    ownedCats: { '002': 1 },
    inventory:  { '021': 1 },
    treasures:  {},
    upgrades:   { atk: 0, hit: 0 }
};
let enemy = { hp: 100, maxHp: 100, id: '001', name: 'スライム' };
const DROP_CHANCE = 0.25;

let adBuffTimer = 0, adWatchCount = 0, isNoAdsPurchased = false;

let partySlots = [
    { type: '剣',   catId: '002', weapId: '021' },
    { type: '銃',   catId: null,  weapId: null  },
    { type: '魔法', catId: null,  weapId: null  }
];

// ===== ヘルパー =====
function getRareClass(rare) {
    return `rare-${rare}`;
}
function getStars(rare) {
    return '★'.repeat(rare) + '☆'.repeat(5 - rare);
}
function getBadgeClass(type) {
    if (type === '剣')   return 'badge-sword';
    if (type === '銃')   return 'badge-gun';
    return 'badge-magic';
}
function getBadgeLabel(type) {
    if (type === '剣')   return '⚔️剣';
    if (type === '銃')   return '🔫銃';
    return '✨魔法';
}
function formatNum(n) {
    if (n >= 1e12) return (n/1e12).toFixed(2) + 'T';
    if (n >= 1e9)  return (n/1e9).toFixed(2)  + 'B';
    if (n >= 1e6)  return (n/1e6).toFixed(2)  + 'M';
    if (n >= 1e4)  return (n/1e3).toFixed(1)  + 'K';
    return Math.floor(n).toLocaleString();
}

// ===== ポップアップ =====
function clickSlot(index) {
    let slot = partySlots[index];
    if (!slot.catId) { alert("この枠のキャラはまだ未所持です！ガチャで当てよう！"); return; }
    let cat = CATS_DB[slot.catId];
    let catCount = player.ownedCats[slot.catId] || 1;
    let catBonusPct = (catCount - 1) * 5;
    let weapHtml = "素手";
    if (slot.weapId) {
        let w = WEAPONS_DB[slot.weapId];
        let wCount = player.inventory[slot.weapId] || 1;
        let wBonus = ((wCount - 1) * 0.5).toFixed(1);
        weapHtml = `<strong>${w.name}</strong> (★${w.rare})<br>
            　武器基礎ATK: <strong>${formatNum(w.baseAtk)}</strong>　重複補正: +${wBonus}% (${wCount}凸)`;
    }
    document.getElementById('pop-title').textContent = `【${cat.name}】詳細`;
    document.getElementById('pop-body').innerHTML = `
        <div style="margin-bottom:10px">
            <span class="stars r${cat.rare}">${getStars(cat.rare)}</span>　レア度 ${cat.rare}<br>
            タイプ: ${cat.type}　所持: ${catCount}体<br>
            キャラ基礎ATK: <strong>${formatNum(cat.baseAtk)}</strong><br>
            重複補正: +${catBonusPct}%
        </div>
        <hr style="border:0;border-top:1px solid rgba(255,255,255,0.1);margin:8px 0">
        <div>⚔️ 装備武器：${weapHtml}</div>
        <hr style="border:0;border-top:1px solid rgba(255,255,255,0.1);margin:8px 0">
        <div style="font-size:10px;color:#8899aa">※最終ATKはキャラ＋武器の合算にゴールド強化・宝物・広告バフが掛け算されます</div>
    `;
    document.getElementById('status-popup').classList.add('active');
}
function closePopup() { document.getElementById('status-popup').classList.remove('active'); }
function openMenu() {
    let reqHit = getHitRequirement(player.stage), myHit = getTotalHit();
    document.getElementById('detailed-stats').innerHTML = `
        最高ステージ: <strong>STAGE ${player.stage}</strong><br>
        宝物攻撃補正: +${(getTreasureBonus('atk')*100).toFixed(0)}%<br>
        宝物ゴールド補正: +${(getTreasureBonus('gold')*100).toFixed(0)}%<br>
        広告バフ倍率: ${adWatchCount > 0 ? '+' + (200 + (adWatchCount-1)*5) + '%' : 'OFF'}<br>
        命中: ${myHit} / 必要: ${reqHit}
    `;
    document.getElementById('menu-overlay').classList.add('active');
}
function closeMenu() { document.getElementById('menu-overlay').classList.remove('active'); }

// ===== 広告バフ =====
function watchAd() {
    if (isNoAdsPurchased) log('👑 広告除去パス：バフ即時加算！');
    else alert('📺 動画広告を再生中...');
    applyAdBuff();
}
function applyAdBuff() {
    adWatchCount++; adBuffTimer = 180;
    let pct = 200 + (adWatchCount-1)*5;
    document.getElementById('ad-buff-text').textContent = `🔥稼働中 (+${pct}%)`;
    log(`📺 広告バフ適用！全報酬＆火力 +${pct}%！`);
    updateUI();
}
function toggleNoAds() {
    isNoAdsPurchased = document.getElementById('no-ads-cheat').checked;
    log(isNoAdsPurchased ? '👑 広告除去パス有効' : '広告除去を無効化');
}
function handleAdTimer() {
    if (adBuffTimer <= 0) return;
    adBuffTimer--;
    let mins = Math.floor(adBuffTimer/60), secs = adBuffTimer%60;
    let pct = 200 + (adWatchCount-1)*5;
    document.getElementById('ad-timer-text').textContent = `残り ${mins}分${secs}秒 (現在 +${pct}%)`;
    if (adBuffTimer === 0) {
        adWatchCount = 0;
        document.getElementById('ad-buff-text').textContent = 'OFF';
        document.getElementById('ad-timer-text').textContent = '動画視聴で3分間【全効果3倍】';
        log('⏳ 広告バフ終了');
    }
}
function getAdBuffMultiplier() {
    return adBuffTimer > 0 && adWatchCount > 0 ? 1.0 + (200 + (adWatchCount-1)*5)/100 : 1.0;
}

// ===== ゲームロジック =====
function getHitRequirement(stg) {
    let block = Math.floor((stg-1)/5);
    const reqs = [0,10,35,80,180,400,900];
    return reqs[block] !== undefined ? reqs[block] : 900 + (block-6)*600;
}
function getEnemyMaxHp(stg) {
    if (stg <= 5) return 40 + stg*60;
    let base = [2500,30000,250000,3000000,25000000,400000000];
    let idx = Math.floor((stg-1)/5) - 1;
    return (base[idx] !== undefined ? base[idx] : 400000000 * Math.pow(10, idx-5)) * (1 + (stg%5)*0.25);
}
function getPrestigePointGain() {
    if (player.stage < 5) return 0;
    return Math.floor(Math.pow(player.stage, 1.75) * 0.12 * (1 + getTreasureBonus('pt')));
}
function getTreasureBonus(type) {
    let bonus = 0;
    for (let id in player.treasures) { if (TREASURES[id].type === type) bonus += TREASURES[id].val + (player.treasures[id]-1)*0.01; }
    return bonus;
}
function getTotalHit() { return Math.floor(player.upgrades.hit * (1 + getTreasureBonus('hit_p'))); }
function getBestWeaponForType(type) {
    let bestAtk = -1, bestWId = null;
    for (let id in WEAPONS_DB) {
        if (WEAPONS_DB[id].type === type && player.inventory[id]) {
            let a = WEAPONS_DB[id].baseAtk * (1 + (player.inventory[id]-1)*0.005);
            if (a > bestAtk) { bestAtk = a; bestWId = id; }
        }
    }
    return { id: bestWId, atk: bestAtk };
}
function autoSelectBestCatForSlot(type) {
    let bestAtk = -1, bestCatId = null;
    for (let id in CATS_DB) {
        if (CATS_DB[id].type === type && player.ownedCats[id]) {
            let score = CATS_DB[id].baseAtk * (1 + (player.ownedCats[id]-1)*0.05);
            if (score > bestAtk) { bestAtk = score; bestCatId = id; }
        }
    }
    return bestCatId;
}

function buyUpgrade(type) {
    let atkCost = Math.floor(10 * Math.pow(1.48, player.upgrades.atk));
    let hitCost = Math.floor(15 * Math.pow(1.55, player.upgrades.hit));
    if (type==='atk' && player.gold >= atkCost) { player.gold -= atkCost; player.upgrades.atk++; }
    else if (type==='hit' && player.gold >= hitCost) { player.gold -= hitCost; player.upgrades.hit++; }
    updateUI();
}

function rollGacha(gachaType) {
    let cost = gachaType === 'weapon' ? 100 : 150;
    if (player.diamond < cost) { alert('💎 ダイヤが足りません！'); return; }
    player.diamond -= cost;
    let rand = Math.random() * 100;
    let rare = rand < 1.2 ? 5 : (rand < 5.5 ? 4 : (rand < 16 ? 3 : (rand < 35 ? 2 : 1)));

    if (gachaType === 'weapon') {
        let pool = Object.keys(WEAPONS_DB).filter(id => WEAPONS_DB[id].rare === rare);
        let selectedId = pool[Math.floor(Math.random() * pool.length)];
        player.inventory[selectedId] = (player.inventory[selectedId] || 0) + 1;
        document.getElementById('gacha-result').textContent = `✨ ★${rare} 武器【${WEAPONS_DB[selectedId].name}】獲得！`;
    } else {
        let startId = 2 + (rare-1)*3;
        let pool = [];
        for (let i = 0; i < 3; i++) {
            let idStr = String(startId+i).padStart(3,'0');
            if (CATS_DB[idStr]) pool.push(idStr);
        }
        let selectedId = pool[Math.floor(Math.random() * pool.length)];
        player.ownedCats[selectedId] = (player.ownedCats[selectedId] || 0) + 1;
        document.getElementById('gacha-result').textContent = `🐱 ★${rare}【${CATS_DB[selectedId].name}】参戦！`;
    }
    updateUI();
}

function doPrestige() {
    let gain = getPrestigePointGain();
    if (gain <= 0) return;
    player.prestigePt += gain;
    player.stage = 1; player.gold = 0; player.upgrades.atk = 0; player.upgrades.hit = 0;
    log(`🌀 時空転生！ +${gain}Pt 獲得、世界がリセットされた。`);
    spawnEnemy(); updateUI();
}

function buyTreasure() {
    if (player.prestigePt < 10) return;
    player.prestigePt -= 10;
    let keys = Object.keys(TREASURES);
    let rolled = keys[Math.floor(Math.random() * keys.length)];
    player.treasures[rolled] = (player.treasures[rolled] || 0) + 1;
    log(`🎁 お宝【${TREASURES[rolled].name}】獲得！`); updateUI();
}

function spawnEnemy() {
    let keys = Object.keys(ENEMIES_DB);
    let rolledId = keys[(player.stage-1) % keys.length];
    enemy.id = rolledId;
    enemy.name = ENEMIES_DB[rolledId].name;
    enemy.maxHp = getEnemyMaxHp(player.stage);
    enemy.hp = enemy.maxHp;
    document.getElementById('enemy-main-img').src = ENEMIES_DB[rolledId].img;
    document.getElementById('enemy-name').textContent = `【${enemy.name}】`;
}

let lastDmgTotal = 0;
function catAttack(slotIndex) {
    let slot = partySlots[slotIndex];
    if (!slot.catId) return;
    let reqHit = getHitRequirement(player.stage), myHit = getTotalHit();
    if (myHit < reqHit && Math.random()*100 > (100-(reqHit-myHit))) return;

    let cat = CATS_DB[slot.catId];
    let catCount = player.ownedCats[slot.catId];
    let catFinalBase = cat.baseAtk * (1 + (catCount-1)*0.05);
    let weapFinalBase = 0;
    if (slot.weapId) {
        let w = WEAPONS_DB[slot.weapId];
        weapFinalBase = w.baseAtk * (1 + (player.inventory[slot.weapId]-1)*0.005);
    }
    let adMult = getAdBuffMultiplier();
    let finalDmg = (catFinalBase + weapFinalBase + player.upgrades.atk*2) * (1+getTreasureBonus('atk')) * adMult;
    if (slot.weapId==='033') finalDmg *= 2;
    if (slot.weapId==='035') finalDmg *= 3;
    if (slot.weapId==='030' && Math.random()<0.15) finalDmg *= 4;
    if (slot.weapId==='032' && Math.random()<0.30) finalDmg *= 3;
    finalDmg = Math.floor(finalDmg);
    if (slot.weapId==='034' && Math.random()<0.40) { enemy.hp -= finalDmg*3; finalDmg *= 4; }
    enemy.hp -= finalDmg;
    showDmgFlash(finalDmg);
    if (enemy.hp <= 0) { enemy.hp = 0; enemyKilled(); }
    updateUI();
}

function showDmgFlash(dmg) {
    let el = document.getElementById('dmg-flash');
    el.textContent = '-' + formatNum(dmg);
    el.className = 'dmg-flash show';
    setTimeout(() => el.className = 'dmg-flash', 650);
}

function enemyKilled() {
    let adMult = getAdBuffMultiplier();
    let goldGet = player.stage * 5 * (1+getTreasureBonus('gold')) * adMult;
    player.gold += goldGet;
    let diaGet = 0;
    if (Math.random() < DROP_CHANCE * adMult) {
        diaGet = Math.floor((5 + Math.floor(player.stage*1.5)) * adMult);
        player.diamond += diaGet;
    }
    log(`💀 【${enemy.name}】撃破！ 💰+${formatNum(goldGet)}G ${diaGet>0?`💎+${diaGet}`:''}`);
    player.stage++; spawnEnemy(); updateUI();
}

function updateUI() {
    document.getElementById('res-gold').textContent      = formatNum(player.gold);
    document.getElementById('res-diamond').textContent   = player.diamond.toLocaleString();
    document.getElementById('res-prestige').textContent  = player.prestigePt.toLocaleString();
    document.getElementById('stage-display').textContent = `STAGE ${player.stage}`;

    let myHit = getTotalHit(), reqHit = getHitRequirement(player.stage);
    let hitRate = myHit >= reqHit ? 100 : Math.max(0, 100-(reqHit-myHit));
    document.getElementById('hit-requirement').textContent   = reqHit;
    document.getElementById('total-hit-val').textContent     = myHit;
    document.getElementById('current-hit-rate').textContent  = hitRate;
    document.getElementById('total-hit-val2').textContent    = myHit;
    document.getElementById('current-hit-rate2').textContent = hitRate;

    let tAtkBonus = 1 + getTreasureBonus('atk');
    let flatAtkBonus = player.upgrades.atk * 2;
    let adMult = getAdBuffMultiplier();

    partySlots.forEach((slot, index) => {
        let slotNum = index + 1;
        let slotEl = document.getElementById(`card-slot-${slotNum}`);
        let bestCatId = autoSelectBestCatForSlot(slot.type);
        partySlots[index].catId = bestCatId;

        if (bestCatId) {
            let bestW = getBestWeaponForType(slot.type);
            partySlots[index].weapId = bestW.id;
            let cat = CATS_DB[bestCatId];
            let catCount = player.ownedCats[bestCatId];

            if (slotEl.classList.contains('empty')) {
                slotEl.classList.remove('empty');
                slotEl.innerHTML = `
                    <div class="card-rarity-bar" id="rarity-bar-${slotNum}"></div>
                    <div class="card-type-badge" id="badge-${slotNum}"></div>
                    <div class="cat-img-box"><img src="" class="cat-img" id="cat-main-img-${slotNum}"></div>
                    <div class="card-name" id="name-cat-${slotNum}">-</div>
                    <div class="weapon-img-box"><img id="weap-img-cat-${slotNum}" class="weapon-img" src=""></div>
                    <div class="weapon-name-text" id="weap-cat-${slotNum}">-</div>
                    <div class="atk-val">ATK:<span id="atk-cat-${slotNum}">0</span></div>
                `;
            }

            // レアリティバー
            let rBar = document.getElementById(`rarity-bar-${slotNum}`);
            rBar.className = `card-rarity-bar ${getRareClass(cat.rare)}`;

            // バッジ
            let badge = document.getElementById(`badge-${slotNum}`);
            badge.className = `card-type-badge ${getBadgeClass(slot.type)}`;
            badge.textContent = getBadgeLabel(slot.type).replace(/[^剣銃魔法]/g,'').trim() || slot.type;
            // バッジのテキストを分かりやすく
            const badgeLabels = { '剣': '⚔️剣', '銃': '🔫銃', '魔法': '✨魔法' };
            badge.textContent = badgeLabels[slot.type] || slot.type;

            document.getElementById(`cat-main-img-${slotNum}`).src = cat.img;
            document.getElementById(`name-cat-${slotNum}`).textContent = `${cat.name}(${catCount}体)`;

            let catFinalBase = cat.baseAtk * (1+(catCount-1)*0.05);
            let weapFinalBase = bestW.id ? bestW.atk : 0;
            let finalAtk = Math.floor((catFinalBase + weapFinalBase + flatAtkBonus) * tAtkBonus * adMult);
            if (bestW.id==='033') finalAtk *= 2;
            if (bestW.id==='035') finalAtk *= 3;
            document.getElementById(`atk-cat-${slotNum}`).textContent = formatNum(finalAtk);

            slotEl.classList.add('active');

            if (bestW.id) {
                document.getElementById(`weap-cat-${slotNum}`).textContent = `${WEAPONS_DB[bestW.id].name}(+${player.inventory[bestW.id]-1}凸)`;
                document.getElementById(`weap-img-cat-${slotNum}`).src = WEAPONS_DB[bestW.id].img;
                document.getElementById(`weap-img-cat-${slotNum}`).style.display = 'block';
            } else {
                document.getElementById(`weap-cat-${slotNum}`).textContent = '素手';
                document.getElementById(`weap-img-cat-${slotNum}`).style.display = 'none';
            }
        } else {
            slotEl.className = 'party-card empty';
            const icons = { '剣': '⚔️', '銃': '🔫', '魔法': '✨' };
            slotEl.innerHTML = `<div class="empty-label">🔒 ${icons[slot.type] || ''}${slot.type}ネコ枠<br>ガチャ未所持</div>`;
        }
    });

    // HP bar
    let pct = Math.max(0, (enemy.hp / enemy.maxHp) * 100);
    document.getElementById('enemy-hp-bar').style.width = `${pct}%`;
    document.getElementById('enemy-hp-text').textContent = `HP: ${formatNum(enemy.hp)} / ${formatNum(enemy.maxHp)}`;

    // Upgrade buttons
    let atkCost = Math.floor(10 * Math.pow(1.48, player.upgrades.atk));
    let hitCost = Math.floor(15 * Math.pow(1.55, player.upgrades.hit));
    document.getElementById('cost-up-atk').textContent = formatNum(atkCost);
    document.getElementById('cost-up-hit').textContent = formatNum(hitCost);
    document.getElementById('lv-up-atk').textContent   = player.upgrades.atk;
    document.getElementById('lv-up-hit').textContent   = player.upgrades.hit;
    document.getElementById('btn-up-atk').disabled = player.gold < atkCost;
    document.getElementById('btn-up-hit').disabled = player.gold < hitCost;
    document.getElementById('gain-prestige-pt').textContent = `+${getPrestigePointGain()}Pt`;

    let tHtml = '';
    for (let tid in player.treasures) { tHtml += `・${TREASURES[tid].name} Lv${player.treasures[tid]}<br>`; }
    document.getElementById('treasure-display').innerHTML = tHtml || '所持宝物: なし';
}

function log(msg) {
    let box = document.getElementById('battle-log');
    box.innerHTML += msg + '<br>';
    box.scrollTop = box.scrollHeight;
}

function initGame() {
    spawnEnemy();
    setInterval(() => catAttack(0), 1000);
    setInterval(() => catAttack(1), 600);
    setInterval(() => catAttack(2), 1600);
    setInterval(updateUI, 250);
    setInterval(handleAdTimer, 1000);
}
window.onload = initGame;
</script>
</body>
</html>
