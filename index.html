<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ネコと武器のインフレ転生RPG</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; text-align: center; background-color: #f0f0f0; padding: 10px; color: #333; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 100%; }
        .btn { padding: 10px; font-size: 14px; cursor: pointer; margin: 3px; border-radius: 5px; border: 1px solid #ccc; background-color: #fff; font-weight: bold; }
        .status { margin: 12px 0; font-size: 15px; font-weight: bold; display: flex; justify-content: space-around; background: #fafafa; padding: 8px; border-radius: 5px; border: 1px solid #eee; }
        .log-box { border: 1px solid #ccc; height: 120px; overflow-y: scroll; background: #fafafa; padding: 10px; font-size: 12px; text-align: left; margin-top: 15px; border-radius: 5px; }
        
        .party-grid { display: flex; gap: 6px; margin: 10px 0; width: 100%; justify-content: space-between; }
        .party-card { border: 1px solid #ddd; padding: 6px; border-radius: 5px; background: #fdfdfd; text-align: center; flex: 1; min-width: 0; }
        .party-card.empty { background: #eee; border: 1px dashed #aaa; color: #999; display: flex; align-items: center; justify-content: center; font-size: 11px; min-height: 160px; }
        
        .cat-img { width: 100%; max-width: 65px; height: 65px; object-fit: contain; margin: 2px 0; background: #fafafa; border-radius: 4px; display: block; margin: 0 auto; }
        .weapon-img-box { width: 100%; max-width: 50px; height: 50px; margin: 3px auto; background: #f0f0f0; border: 1px dashed #bbb; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .weapon-img { width: 100%; height: 100%; object-fit: contain; }
        .weapon-text { font-size: 11px; color: #444; min-height: 28px; display: flex; align-items: center; justify-content: center; font-weight: bold; line-height: 1.2; }
        
        .enemy-box { margin: 10px 0; text-align: center; }
        .enemy-img { width: 100px; height: 100px; object-fit: contain; background: #fafafa; border-radius: 8px; margin-bottom: 3px; display: inline-block; }
        .hp-bar-container { background: #ddd; width: 100%; height: 15px; border-radius: 10px; margin: 8px 0; overflow: hidden; }
        .hp-bar { background: #ff4d4d; width: 100%; height: 100%; transition: width 0.1s; }
        .section-title { font-size: 14px; font-weight: bold; margin-top: 15px; border-bottom: 2px solid #ccc; padding-bottom: 3px; text-align: left; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 5px;">
        <h1 style="margin:0; font-size:18px;">🐱 ネコインフレRPG</h1>
    </div>
    
    <h2 id="stage-display">STAGE 1</h2>
    
    <div class="enemy-box">
        <img id="enemy-main-img" src="1000007696.png" class="enemy-img" alt="敵ボス" onerror="fixImgPath(this);"><br>
        <div style="font-size: 16px; font-weight: bold;" id="enemy-name">スライム</div>
    </div>
    
    <div class="hp-bar-container"><div class="hp-bar" id="enemy-hp-bar"></div></div>
    <div id="enemy-hp-text" style="font-size:13px; font-weight:bold;">HP: 100 / 100</div>

    <div class="status">
        <span>💰 金: <span id="res-gold">0</span></span>
        <span>💎 ダイヤ: <span id="res-diamond">0</span></span>
    </div>

    <div class="section-title">🛡️ 出撃パーティ</div>
    <div class="party-grid">
        <div class="party-card" id="card-slot-1">
            <h4>茶ネコ (星1)</h4>
            <img src="1000007692.png" class="cat-img" alt="茶ネコ" onerror="fixImgPath(this);">
            <div class="weapon-img-box"><img id="weap-img-cat-1" class="weapon-img" src="001.png" alt="武器" onerror="fixImgPath(this);"></div>
            <div class="weapon-text" id="weap-cat-1">木の棒</div>
            <div style="color: #d63031; font-weight: bold; font-size:12px;">ATK: <span id="atk-cat-1">10</span></div>
        </div>
        <div class="party-card empty"><div>銃ネコ<br>未解放</div></div>
        <div class="party-card empty"><div>魔法ネコ<br>未解放</div></div>
    </div>

    <div class="section-title">🎰 ガチャ</div>
    <div style="display: flex; gap: 5px; margin-top: 5px;">
        <button class="btn" style="flex:1; background:#ff9f43; color:white; border:none;" onclick="rollWeaponGacha()">武器ガチャ (💎100)</button>
    </div>
    <div id="gacha-result" style="font-size:11px; margin-top:4px; color:#e17055; font-weight:bold; min-height:14px;"></div>

    <div class="log-box" id="battle-log"></div>
</div>

<script>
// 画像読み込みエラーが起きたら自動で images/ フォルダを探しにいく絶対防衛プログラム
function fixImgPath(img) {
    let filename = img.src.substring(img.src.lastIndexOf('/') + 1);
    if (!img.src.includes('images/')) {
        img.src = 'images/' + filename;
    } else {
        // 大文字小文字のミス（.png と .PNG）対策
        if (img.src.includes('.png')) {
            img.src = 'images/' + filename.replace('.png', '.jpg');
        } else {
            img.style.visibility = 'hidden'; // どうしても無い場合は非表示
        }
    }
}

let player = { gold: 0, diamond: 0, stage: 1, inventory: {'001': 1} };
let enemy = { hp: 100, maxHp: 100, name: 'スライム' };
let currentLoadedWeaponId = '';

function updateUI() {
    document.getElementById('res-gold').innerText = Math.floor(player.gold);
    document.getElementById('res-diamond').innerText = player.diamond;
    document.getElementById('stage-display').innerText = `STAGE ${player.stage}`;
    document.getElementById('enemy-name').innerText = enemy.name;

    // 茶ネコの武器攻撃力と画像更新
    let dupCount = player.inventory['001'] - 1;
    let finalAtk = Math.floor(10 * (1 + dupCount * 0.005));
    document.getElementById('atk-cat-1').innerText = finalAtk;
    document.getElementById('weap-cat-1').innerText = `木の棒 (+${dupCount}凸)`;
    
    if (currentLoadedWeaponId !== '001') {
        currentLoadedWeaponId = '001';
        document.getElementById('weap-img-cat-1').src = `001.png`;
    }

    // 敵HPバー
    let pct = Math.max(0, (enemy.hp / enemy.maxHp) * 100);
    document.getElementById('enemy-hp-bar').style.width = `${pct}%`;
    document.getElementById('enemy-hp-text').innerText = `HP: ${Math.floor(enemy.hp)} / ${enemy.maxHp}`;
}

function log(msg) {
    let box = document.getElementById('battle-log');
    box.innerHTML += msg + "<br>"; box.scrollTop = box.scrollHeight;
}

// 完全にエラーを排除した安全な自動攻撃ロジック
function catAttack() {
    let dupCount = player.inventory['001'] - 1;
    let finalDmg = Math.floor(10 * (1 + dupCount * 0.005));
    
    enemy.hp -= finalDmg;
    log(`⚔️ 茶ネコがスライムに ${finalDmg} ダメージ！`);

    if (enemy.hp <= 0) {
        enemy.hp = 0;
        player.gold += player.stage * 5;
        // 25%でダイヤ獲得
        let getDia = 0;
        if (Math.random() < 0.25) {
            getDia = 5 + Math.floor(player.stage * 1.5);
            player.diamond += getDia;
        }
        log(`💀 敵撃破！ 💰+${player.stage * 5}G ${getDia > 0 ? `💎+${getDia}` : ''}`);
        
        player.stage++;
        enemy.maxHp = 50 + player.stage * 50;
        enemy.hp = enemy.maxHp;
    }
    updateUI();
}

function rollWeaponGacha() {
    if (player.diamond < 100) { alert("ダイヤが足りません！"); return; }
    player.diamond -= 100;
    player.inventory['001']++; // 被り強化
    document.getElementById('gacha-result').innerText = `木の棒（001）が重複！攻撃力が0.5%アップしました！`;
    updateUI();
}

function initGame() {
    // 1秒ごとに茶ネコが絶対に攻撃するループ
    setInterval(catAttack, 1000);
    setInterval(updateUI, 250);
}
window.onload = initGame;
</script>
</body>
</html>
