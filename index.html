<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ネコと武器のインフレ転生RPG</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; }
        h1, h2 { text-align: center; color: #ffd700; margin-bottom: 10px; }
        .container { display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; gap: 15px; }
        
        /* バトルエリア */
        .battle-card { background: #2a2a2a; padding: 20px; border-radius: 12px; border: 2px solid #444; text-align: center; position: relative; }
        .stage-title { font-size: 24px; font-weight: bold; color: #ff6b6b; }
        .hp-bar-bg { background: #555; width: 100%; height: 20px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .hp-bar { background: #ff4757; width: 100%; height: 100%; transition: width 0.1s; }
        .log-box { background: #111; height: 100px; overflow-y: auto; padding: 10px; border-radius: 6px; text-align: left; font-size: 13px; font-family: monospace; color: #00ffcc; margin-top: 10px; }
        
        /* ステータス・編成エリア */
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { background: #252525; padding: 15px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        .card h3 { margin-top: 0; color: #00d2d3; }
        .weapon-name { font-size: 12px; color: #ff9f43; min-height: 32px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        /* ボタン・リソース関係 */
        .resource-bar { display: flex; justify-content: space-around; background: #202020; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 16px; border: 1px solid #444; }
        .btn { background: #2ed573; color: white; border: none; padding: 10px 15px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; box-sizing: border-box; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }
        .btn:disabled { background: #555; cursor: not-allowed; transform: none; }
        .btn-gacha { background: #ff9f43; }
        .btn-prestige { background: #9b59b6; }
        
        /* 宝物リスト */
        .treasure-list { max-height: 120px; overflow-y: auto; text-align: left; font-size: 12px; padding: 5px; background: #151515; border-radius: 6px; }
    </style>
</head>
<body>

<h1>🐱 ネコと武器のインフレ転生RPG ⚔️</h1>

<div class="container">
    
    <!-- リソース情報 -->
    <div class="resource-bar">
        <span>💰 ゴールド: <span id="res-gold">0</span></span>
        <span>💎 ダイヤ: <span id="res-diamond">0</span></span>
        <span>🌀 転生Pt: <span id="res-prestige">0</span></span>
    </div>

    <!-- バトル画面 -->
    <div class="battle-card">
        <div class="stage-title" id="stage-display">STAGE 1</div>
        <div id="hit-requirement" style="font-size: 12px; color: #aaa; margin-top: 5px;">必要命中値: 0</div>
        <div style="font-size: 18px; margin-top: 10px; font-weight: bold;" id="enemy-name">木人ボブ</div>
        <div class="hp-bar-bg"><div class="hp-bar" id="enemy-hp-bar"></div></div>
        <div style="font-size: 14px;" id="enemy-hp-text">HP: 100 / 100</div>
        <div class="log-box" id="battle-log"></div>
    </div>

    <!-- パーティ編成＆自動装備状態 -->
    <h2>🛡️ 出撃ネコ（自動最強装備）</h2>
    <div class="grid-3">
        <div class="card">
            <h3>🗡️ 剣ネコ</h3>
            <p style="font-size:12px; color:#aaa;">速度: 1.0s</p>
            <div class="weapon-name" id="weap-cat-1">装備中: 木の棒</div>
            <div style="font-size: 13px; color: #ff6b6b;">攻撃力: <span id="atk-cat-1">10</span></div>
        </div>
        <div class="card">
            <h3>🔫 銃ネコ</h3>
            <p style="font-size:12px; color:#aaa;">速度: 0.6s</p>
            <div class="weapon-name" id="weap-cat-2">装備中: パチンコ</div>
            <div style="font-size: 13px; color: #ff6b6b;">攻撃力: <span id="atk-cat-2">6</span></div>
        </div>
        <div class="card">
            <h3>🔮 魔法ネコ</h3>
            <p style="font-size:12px; color:#aaa;">速度: 1.6s</p>
            <div class="weapon-name" id="weap-cat-3">装備中: 木の杖</div>
            <div style="font-size: 13px; color: #ff6b6b;">攻撃力: <span id="atk-cat-3">16</span></div>
        </div>
    </div>

    <!-- 常時強化ボタン -->
    <h2>💪 常時ゴールド強化（インフレ抑制版）</h2>
    <div class="grid-3">
        <div>
            <button class="btn" id="btn-up-atk" onclick="buyUpgrade('atk')">基礎攻撃+2<br><span id="cost-up-atk">10</span>G (Lv<span id="lv-up-atk">0</span>)</button>
        </div>
        <div>
            <button class="btn" id="btn-up-hit" onclick="buyUpgrade('hit')">命中値+1<br><span id="cost-up-hit">15</span>G (Lv<span id="lv-up-hit">0</span>)</button>
        </div>
        <div class="card" style="padding: 8px; font-size: 13px;">
            <div>総命中値: <span id="total-hit-val" style="color:#00ffcc; font-weight:bold;">0</span></div>
            <div style="font-size:11px; color:#aaa; margin-top:4px;">現在の命中率: <span id="current-hit-rate">100</span>%</div>
        </div>
    </div>

    <!-- ガチャ ＆ 転生 -->
    <h2>🎰 ダイヤガチャ ＆ 🔄 時空転生ショップ</h2>
    <div class="grid-3">
        <div class="card">
            <button class="btn btn-gacha" id="btn-gacha-roll" onclick="rollGacha()">武器ガチャ (💎100)<br><span style="font-size:11px;">星5確率 1%</span></button>
            <div id="gacha-result" style="font-size:12px; margin-top:8px; color:#ffd700; font-weight:bold;"></div>
        </div>
        <div class="card">
            <button class="btn btn-prestige" id="btn-do-prestige" onclick="doPrestige()">時空転生を行う<br><span style="font-size:11px;">+<span id="gain-prestige-pt">0</span> Pt獲得可能</span></button>
            <p style="font-size:11px; color:#aaa; margin:5px 0 0 0;">※ステージ5以降可能</p>
        </div>
        <div class="card">
            <button class="btn btn-prestige" id="btn-buy-treasure" onclick="buyTreasure()">宝物ガチャ (🌀10Pt)</button>
            <div class="treasure-list" id="treasure-display">所持宝物なし</div>
        </div>
    </div>

</div>

<script>
// --- ゲームデータ・マスター ---
const WEAPONS = {
    '001': { name: '木の棒', rare: 1, type: '剣', atk: 10 },
    '002': { name: 'パチンコ', rare: 1, type: '銃', atk: 6 },
    '023': { name: '木の杖', rare: 1, type: '魔法', atk: 16 },
    '024': { name: '銅の剣', rare: 2, type: '剣', atk: 100 },
    '025': { name: '銅の銃', rare: 2, type: '銃', atk: 60 },
    '026': { name: '銅の杖', rare: 2, type: '魔法', atk: 160 },
    '027': { name: '鉄の剣', rare: 3, type: '剣', atk: 1000 },
    '028': { name: '鉄の銃', rare: 3, type: '銃', atk: 600 },
    '029': { name: '鉄の杖', rare: 3, type: '魔法', atk: 1600 },
    '030': { name: 'オーラを放つ剣', rare: 4, type: '剣', atk: 10000, proc: '単体強撃(15%で4倍)' },
    '031': { name: 'オーラを放つ銃', rare: 4, type: '銃', atk: 6000, proc: '急速装填(会心時速度3倍)' },
    '032': { name: 'オーラを放つ杖', rare: 4, type: '魔法', atk: 16000, proc: '魔力暴走(30%で3倍)' },
    '033': { name: '覇王の剣', rare: 5, type: '剣', atk: 100000, proc: '防御無視・常時会心' },
    '034': { name: '覇王の銃', rare: 5, type: '銃', atk: 60000, proc: '40%で3連続追撃' },
    '035': { name: '覇王の杖', rare: 5, type: '魔法', atk: 160000, proc: '常時ダメ3倍' }
};

const TREASURES = {
    't1': { name: '錆びた手鏡', rare: 1, desc: '基礎攻撃力+2%', type: 'atk', val: 0.02 },
    't2': { name: '旅人の財布', rare: 1, desc: '金ドロップ+3%', type: 'gold', val: 0.03 },
    't3': { name: '古びた虫眼鏡', rare: 1, desc: '基礎命中率+1%', type: 'hit_p', val: 0.01 },
    't4': { name: '魔導師の魔導書', rare: 4, desc: '転生ポイント+20%', type: 'pt', val: 0.20 },
    't5': { name: '覇王の刻印', rare: 5, desc: '転生ポイント+100%', type: 'pt', val: 1.00 }
};

// --- プレイヤー状態 ---
let player = {
    gold: 0, diamond: 300, prestigePt: 0,
    stage: 1,
    inventory: {'001': 1, '002': 1, '023': 1}, // 最初から初期装備は1つ持っている扱い
    treasures: {},
    upgrades: { atk: 0, hit: 0 }
};

// --- エネミー状態 ---
let enemy = { hp: 100, maxHp: 100, name: '木人ボブ' };

// --- タイマー管理 ---
let timers = [];

// --- 共通ドロップ率 (25%) ---
const DROP_CHANCE = 0.25;

// --- 計算関数群 ---
function getHitRequirement(stg) {
    let block = Math.floor((stg - 1) / 5);
    const hitRequirements = [0, 10, 30, 70, 150, 350, 800];
    return hitRequirements[block] !== undefined ? hitRequirements[block] : 800 + (block - 6) * 500;
}

function getEnemyMaxHp(stg) {
    if (stg <= 5) return 50 + stg * 50;
    let scale = Math.pow(10, Math.floor((stg - 1) / 5));
    let base = [2000, 25000, 200000, 2500000, 20000000, 250000000];
    let idx = Math.floor((stg - 1) / 5) - 1;
    return (base[idx] !== undefined ? base[idx] : 250000000 * Math.pow(10, idx - 5)) * (1 + (stg % 5) * 0.2);
}

function getPrestigePointGain() {
    if (player.stage < 5) return 0;
    let basePt = Math.floor(Math.pow(player.stage, 1.8) * 0.1);
    let mult = 1 + getTreasureBonus('pt');
    return Math.floor(basePt * mult);
}

function getTreasureBonus(type) {
    let bonus = 0;
    for (let id in player.treasures) {
        let count = player.treasures[id];
        let t = TREASURES[id];
        if (t.type === type) {
            bonus += t.val + (count - 1) * 0.01; // 被りは一律+1%
        }
    }
    return bonus;
}

function getCatBestWeaponAtk(type) {
    let bestAtk = 0;
    let bestWId = null;
    for (let id in WEAPONS) {
        if (WEAPONS[id].type === type && player.inventory[id]) {
            let dupCount = player.inventory[id] - 1;
            let currentAtk = WEAPONS[id].atk * (1 + dupCount * 0.005); // 被り強化+0.5%
            if (currentAtk > bestAtk) {
                bestAtk = currentAtk;
                bestWId = id;
            }
        }
    }
    return { atk: bestAtk, id: bestWId };
}

function getTotalHit() {
    let baseHit = player.upgrades.hit * 1; 
    let tBonus = getTreasureBonus('hit_p');
    return Math.floor(baseHit * (1 + tBonus));
}

// --- 描画更新 ---
function updateUI() {
    document.getElementById('res-gold').innerText = Math.floor(player.gold).toLocaleString();
    document.getElementById('res-diamond').innerText = player.diamond.toLocaleString();
    document.getElementById('res-prestige').innerText = player.prestigePt.toLocaleString();
    
    document.getElementById('stage-display').innerText = `STAGE ${player.stage}`;
    let reqHit = getHitRequirement(player.stage);
    document.getElementById('hit-requirement').innerText = `必要命中値: ${reqHit}`;
    
    let myHit = getTotalHit();
    document.getElementById('total-hit-val').innerText = myHit;
    let hitRate = 100;
    if (myHit < reqHit) hitRate = Math.max(0, 100 - (reqHit - myHit));
    document.getElementById('current-hit-rate').innerText = hitRate;

    // ネコ情報自動装備反映
    let w1 = getCatBestWeaponAtk('剣');
    let w2 = getCatBestWeaponAtk('銃');
    let w3 = getCatBestWeaponAtk('魔法');

    // 宝物と常時強化による攻撃％補正を適用
    let tAtkBonus = 1 + getTreasureBonus('atk');
    let flatAtkBonus = player.upgrades.atk * 2; // 常時強化は固定値+2ずつ

    document.getElementById('weap-cat-1').innerText = `装備中: ${WEAPONS[w1.id].name} (凸${player.inventory[w1.id]-1})`;
    document.getElementById('atk-cat-1').innerText = Math.floor((w1.atk + flatAtkBonus) * tAtkBonus).toLocaleString();
    
    document.getElementById('weap-cat-2').innerText = `装備中: ${WEAPONS[w2.id].name} (凸${player.inventory[w2.id]-1})`;
    document.getElementById('atk-cat-2').innerText = Math.floor((w2.atk + flatAtkBonus) * tAtkBonus).toLocaleString();
    
    document.getElementById('weap-cat-3').innerText = `装備中: ${WEAPONS[w3.id].name} (凸${player.inventory[w3.id]-1})`;
    document.getElementById('atk-cat-3').innerText = Math.floor((w3.atk + flatAtkBonus) * tAtkBonus).toLocaleString();

    // アップグレードボタンのコスト
    let atkCost = Math.floor(10 * Math.pow(1.5, player.upgrades.atk));
    let hitCost = Math.floor(15 * Math.pow(1.6, player.upgrades.hit));
    document.getElementById('cost-up-atk').innerText = atkCost.toLocaleString();
    document.getElementById('lv-up-atk').innerText = player.upgrades.atk;
    document.getElementById('btn-up-atk').disabled = player.gold < atkCost;

    document.getElementById('cost-up-hit').innerText = hitCost.toLocaleString();
    document.getElementById('lv-up-hit').innerText = player.upgrades.hit;
    document.getElementById('btn-up-hit').disabled = player.gold < hitCost;

    // 転生・宝物情報
    document.getElementById('gain-prestige-pt').innerText = getPrestigePointGain().toLocaleString();
    document.getElementById('btn-do-prestige').disabled = player.stage < 5;
    document.getElementById('btn-buy-treasure').disabled = player.prestigePt < 10;

    let tHtml = "";
    for(let tid in player.treasures) {
        tHtml += `・${TREASURES[tid].name} Lv.${player.treasures[tid]}<br>`;
    }
    document.getElementById('treasure-display').innerHTML = tHtml || "所持宝物なし";

    // 敵HPバー
    let pct = Math.max(0, (enemy.hp / enemy.maxHp) * 100);
    document.getElementById('enemy-hp-bar').style.width = `${pct}%`;
    document.getElementById('enemy-hp-text').innerText = `HP: ${Math.floor(enemy.hp).toLocaleString()} / ${Math.floor(enemy.maxHp).toLocaleString()}`;
    document.getElementById('enemy-name').innerText = enemy.name;
}

function log(msg) {
    let box = document.getElementById('battle-log');
    box.innerHTML += msg + "<br>";
    box.scrollTop = box.scrollHeight;
}

// --- 常時強化処理 ---
function buyUpgrade(type) {
    let atkCost = Math.floor(10 * Math.pow(1.5, player.upgrades.atk));
    let hitCost = Math.floor(15 * Math.pow(1.6, player.upgrades.hit));
    
    if (type === 'atk' && player.gold >= atkCost) {
        player.gold -= atkCost;
        player.upgrades.atk++;
    } else if (type === 'hit' && player.gold >= hitCost) {
        player.gold -= hitCost;
        player.upgrades.hit++;
    }
    updateUI();
}

// --- ガチャシステム ---
function rollGacha() {
    if (player.diamond < 100) {
        alert("ダイヤが足りません！");
        return;
    }
    player.diamond -= 100;
    
    let rand = Math.random() * 100;
    let selectedId = '001';
    
    // 排出率基準の抽選
    if (rand < 1) { // 星5 (1%)
        let pool = ['033', '034', '035'];
        selectedId = pool[Math.floor(Math.random() * pool.length)];
    } else if (rand < 5) { // 星4 (4%)
        let pool = ['030', '031', '032'];
        selectedId = pool[Math.floor(Math.random() * pool.length)];
    } else if (rand < 15) { // 星3 (10%)
        let pool = ['027', '028', '029'];
        selectedId = pool[Math.floor(Math.random() * pool.length)];
    } else if (rand < 30) { // 星2 (15%)
        let pool = ['024', '025', '026'];
        selectedId = pool[Math.floor(Math.random() * pool.length)];
    } else { // 星1 (70%)
        let pool = ['001', '002', '023'];
        selectedId = pool[Math.floor(Math.random() * pool.length)];
    }

    player.inventory[selectedId] = (player.inventory[selectedId] || 0) + 1;
    let w = WEAPONS[selectedId];
    document.getElementById('gacha-result').innerText = `★${w.rare} 【${w.name}】 獲得！`;
    
    updateUI();
}

// --- 転生システム ---
function doPrestige() {
    let gain = getPrestigePointGain();
    if (gain <= 0) return;
    
    player.prestigePt += gain;
    player.stage = 1;
    player.gold = 0;
    player.upgrades.atk = 0;
    player.upgrades.hit = 0;
    
    log(`🔄 時空転生を行い、🌀 ${gain} Ptを獲得した！世界がリセットされた。`);
    spawnEnemy();
    updateUI();
}

function buyTreasure() {
    if (player.prestigePt < 10) return;
    player.prestigePt -= 10;
    
    let keys = Object.keys(TREASURES);
    let rolled = keys[Math.floor(Math.random() * keys.length)];
    
    player.treasures[rolled] = (player.treasures[rolled] || 0) + 1;
    alert(`宝物【${TREASURES[rolled].name}】を獲得！`);
    updateUI();
}

// --- バトルロジック ---
function spawnEnemy() {
    enemy.maxHp = getEnemyMaxHp(player.stage);
    enemy.hp = enemy.maxHp;
    
    const names = ['ゴーレム', 'スライム公爵', 'シャドウナイト', '大魔導ピクシー', 'ドラゴンタイラント', '次元喰らい'];
    enemy.name = `STAGE ${player.stage} : ${names[(player.stage-1) % names.length]}`;
}

function catAttack(catType, speedSec) {
    // 命中チェック
    let reqHit = getHitRequirement(player.stage);
    let myHit = getTotalHit();
    let hitRate = 100;
    if (myHit < reqHit) hitRate = Math.max(0, 100 - (reqHit - myHit));
    
    if (Math.random() * 100 > hitRate) {
        log(`＞ ${catType}ネコの攻撃... Miss! 命中が足りない！`);
        return;
    }

    let w = getCatBestWeaponAtk(catType);
    let tAtkBonus = 1 + getTreasureBonus('atk');
    let flatAtkBonus = player.upgrades.atk * 2;
    let baseDmg = (w.atk + flatAtkBonus) * tAtkBonus;
    
    // 特殊効果の仮簡易計算（星4、星5用）
    let isCrit = false;
    if (w.id === '033') { baseDmg *= 2; isCrit = true; } // 覇王の剣常時会心
    if (w.id === '035') { baseDmg *= 3; } // 覇王の杖常時3倍
    if (w.id === '030' && Math.random() < 0.15) { baseDmg *= 4; isCrit = true; } 
    if (w.id === '032' && Math.random() < 0.30) { baseDmg *= 3; isCrit = true; }

    let finalDmg = Math.floor(baseDmg);
    enemy.hp -= finalDmg;
    
    log(`⚔️ ${catType}ネコが ${finalDmg.toLocaleString()} ダメージを与えた！ ${isCrit ? '💥CRITICAL!' : ''}`);
    
    // 覇王の銃の追撃効果(40%)
    if (w.id === '034' && Math.random() < 0.40) {
        log(`⚡ 覇王の銃の【連鎖追撃】発動！`);
        enemy.hp -= finalDmg * 3;
        log(`⚔️ 追撃！ 3連撃で ${(finalDmg * 3).toLocaleString()} ダメージ！`);
    }

    if (enemy.hp <= 0) {
        enemy.hp = 0;
        enemyKilled();
    }
    updateUI();
}

function enemyKilled() {
    // 報酬獲得
    let baseGold = player.stage * 5 * (1 + getTreasureBonus('gold'));
    player.gold += baseGold;
    
    let diaGet = 0;
    // ダイヤはすべて「共通ドロップ率(25%)」でドロップ
    if (Math.random() < DROP_CHANCE) {
        // ステージが進むほどドロップするダイヤ数が増加するインフレ仕様
        diaGet = 5 + Math.floor(player.stage * 1.5);
        player.diamond += diaGet;
    }
    
    log(`💀 敵を撃破！ 💰+${Math.floor(baseGold)}G ${diaGet > 0 ? `💎+${diaGet}ダイヤ！` : ''}`);
    
    // ステージ進行
    player.stage++;
    spawnEnemy();
}

// --- ループ起動 ---
function initGame() {
    spawnEnemy();
    // 3体のネコの攻撃サイクルを別々に回す
    setInterval(() => catAttack('剣'), 1000);
    setInterval(() => catAttack('銃'), 600);
    setInterval(() => catAttack('魔法'), 1600);
    
    // UI定期更新
    setInterval(updateUI, 200);
    log("🎮 ゲームスタート！ネコたちが自動で攻撃を開始します。");
}

window.onload = initGame;
</script>
</body>
</html>
