<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ネコと武器のインフレ転生RPG</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; text-align: center; background-color: #f0f0f0; padding: 10px; color: #333; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); position: relative; width: 100%; }
        .btn { padding: 10px; font-size: 14px; cursor: pointer; margin: 3px; border-radius: 5px; border: 1px solid #ccc; background-color: #fff; transition: 0.2s; font-weight: bold; }
        .btn:hover { background-color: #e0e0e0; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .status { margin: 12px 0; font-size: 15px; font-weight: bold; display: flex; justify-content: space-around; background: #fafafa; padding: 8px; border-radius: 5px; border: 1px solid #eee; }
        .log-box { border: 1px solid #ccc; height: 120px; overflow-y: scroll; background: #fafafa; padding: 10px; font-size: 12px; text-align: left; margin-top: 15px; border-radius: 5px; }
        
        .party-grid { display: flex; gap: 6px; margin: 10px 0; width: 100%; justify-content: space-between; }
        .party-card { border: 1px solid #ddd; padding: 6px; border-radius: 5px; background: #fdfdfd; text-align: center; flex: 1; min-width: 0; }
        .party-card.empty { background: #eee; border: 1px dashed #aaa; color: #999; display: flex; align-items: center; justify-content: center; font-size: 12px; min-height: 180px; }
        .party-card h4 { margin: 0 0 3px 0; color: #555; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .cat-img { width: 100%; max-width: 65px; height: 65px; object-fit: contain; margin: 2px 0; background: #fafafa; border-radius: 4px; display: block; margin: 0 auto; }
        .weapon-img-box { width: 100%; max-width: 50px; height: 50px; margin: 3px auto; background: #f0f0f0; border: 1px dashed #bbb; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .weapon-img { width: 100%; height: 100%; object-fit: contain; }
        .weapon-text { font-size: 11px; color: #444; min-height: 28px; display: flex; align-items: center; justify-content: center; font-weight: bold; word-break: break-all; line-height: 1.2; }
        
        .enemy-box { margin: 10px 0; text-align: center; }
        .enemy-img { width: 100px; height: 100px; object-fit: contain; background: #fafafa; border-radius: 8px; margin-bottom: 3px; display: inline-block; }
        .hp-bar-container { background: #ddd; width: 100%; height: 15px; border-radius: 10px; margin: 8px 0; overflow: hidden; }
        .hp-bar { background: #ff4d4d; width: 100%; height: 100%; transition: width 0.1s; }
        
        .section-title { font-size: 14px; font-weight: bold; margin-top: 15px; border-bottom: 2px solid #ccc; padding-bottom: 3px; text-align: left; color: #444; }
        .treasure-box { background: #f9f9f9; border: 1px dashed #aaa; padding: 6px; font-size: 11px; text-align: left; max-height: 70px; overflow-y: auto; margin-top: 5px; width: 100%; }
        
        .flex-row { display: flex; gap: 6px; margin-top: 8px; width: 100%; align-items: stretch; }
        .flex-item { flex: 1; min-width: 0; }
        
        #menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; padding: 15px; box-sizing: border-box; overflow-y: auto; z-index: 100; }
        .menu-content { max-width: 450px; margin: 20px auto; text-align: left; background: #222; padding: 15px; border-radius: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 5px;">
        <h1 style="margin:0; font-size:18px;">🐱 ネコインフレRPG</h1>
        <button class="btn" style="margin:0; padding:4px 10px; font-size:12px;" onclick="toggleMenu()">MENU</button>
    </div>
    
    <h2 id="stage-display" style="margin: 10px 0 3px 0; font-size: 20px;">STAGE 1</h2>
    <div style="font-size: 11px; color: #666;" id="hit-requirement">必要命中値: 0</div>
    
    <div class="enemy-box">
        <img id="enemy-main-img" src="images/1000007696.png" class="enemy-img" alt="敵ボス"><br>
        <div style="font-size: 16px; font-weight: bold;" id="enemy-name">木人ボブ</div>
    </div>
    
    <div class="hp-bar-container"><div class="hp-bar" id="enemy-hp-bar"></div></div>
    <div id="enemy-hp-text" style="font-size:13px; font-weight:bold;">HP: 100 / 100</div>

    <div class="status">
        <span>💰 <span id="res-gold">0</span> G</span>
        <span>💎 <span id="res-diamond">0</span></span>
        <span>🌀 <span id="res-prestige">0</span> Pt</span>
    </div>

    <div class="section-title">🛡️ 出撃パーティ（自動最強選抜＆自動最強装備）</div>
    <div class="party-grid">
        <div class="party-card" id="card-slot-1">
            <h4 id="name-cat-1">茶ネコ (星1)</h4>
            <img src="images/1000007692.png" class="cat-img" alt="ネコ1">
            <div class="weapon-img-box"><img id="weap-img-cat-1" class="weapon-img" src="images/001.png" alt="武器"></div>
            <div class="weapon-text" id="weap-cat-1">木の棒</div>
            <div style="color: #d63031; font-weight: bold; font-size:12px;">ATK:<span id="atk-cat-1">10</span></div>
        </div>

        <div class="party-card empty" id="card-slot-2">
            <div>銃ネコ未所持</div>
        </div>

        <div class="party-card empty" id="card-slot-3">
            <div>魔法ネコ未所持</div>
        </div>
    </div>

    <div class="section-title">💪 ゴールド常時強化（インフレ抑制）</div>
    <div class="flex-row" style="align-items: center;">
        <div class="flex-item"><button class="btn" style="width:100%; font-size:12px; padding:6px;" id="btn-up-atk" onclick="buyUpgrade('atk')">攻撃強化 (+2)<br><span id="cost-up-atk">10</span>G (Lv<span id="lv-up-atk">0</span>)</button></div>
        <div class="flex-item"><button class="btn" style="width:100%; font-size:12px; padding:6px;" id="btn-up-hit" onclick="buyUpgrade('hit')">命中強化 (+1)<br><span id="cost-up-hit">15</span>G (Lv<span id="lv-up-hit">0</span>)</button></div>
        <div style="text-align: right; font-size: 11px; font-weight: bold; min-width: 85px; line-height: 1.3;">
            総命中: <span id="total-hit-val" style="color:#00b894;">0</span><br>
            確率: <span id="current-hit-rate">100</span>%
        </div>
    </div>

    <div class="section-title">🎰 各種ガチャ ＆ 🔄 時空転生</div>
    <div class="flex-row">
        <div class="flex-item">
            <button class="btn" style="width: 100%; margin:0; font-size:12px; padding:8px; background:#ff9f43; color:white; border:none;" onclick="rollGacha('weapon')">武器ガチャ<br>(💎100)</button>
        </div>
        <div class="flex-item">
            <button class="btn" style="width: 100%; margin:0; font-size:12px; padding:8px; background:#0abde3; color:white; border:none;" onclick="rollGacha('cat')">キャラガチャ<br>(💎150)</button>
        </div>
        <div class="flex-item">
            <button class="btn" style="width: 100%; margin:0; font-size:12px; padding:8px;" id="btn-do-prestige" onclick="doPrestige()">時空転生<br><span style="font-size:10px;">(+<span id="gain-prestige-pt">0</span>Pt)</span></button>
        </div>
    </div>

    <div class="flex-row">
        <div class="flex-item">
            <button class="btn" style="width: 100%; margin:0; font-size:13px; padding:8px;" id="btn-buy-treasure" onclick="buyTreasure()">お宝ガチャ (🌀10Pt)</button>
        </div>
        <div class="flex-item" style="text-align: left;">
            <div class="treasure-box" id="treasure-display">🎁 所持宝物: なし</div>
        </div>
    </div>
    <div id="gacha-result" style="font-size:11px; margin-top:4px; color:#e17055; font-weight:bold; min-height:14px; text-align:center;"></div>

    <div class="log-box" id="battle-log"></div>
</div>

<div id="menu-overlay">
    <div class="menu-content">
        <h2 style="color: #ffd700; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 5px; font-size:18px;">📑 メニュー</h2>
        <h3 style="font-size:14px; margin:10px 0 5px 0;">📊 現在の詳細ステータス</h3>
        <div id="detailed-stats" style="line-height: 1.5; background: #333; padding: 10px; border-radius: 5px; font-size: 13px;"></div>
        <button class="btn" style="width:100%; margin-top:15px; background:#e74c3c; color:white; border:none; padding:8px;" onclick="toggleMenu()">閉じる</button>
    </div>
</div>

<script>
const WEAPONS = {
    '001': { name: '木の棒', rare: 1, type: '剣', atk: 10 },
    '002': { name: 'パチンコ', rare: 1, type: '銃', atk: 6 },
    '023': { name: '木の杖', rare: 1, type: '魔法', atk: 16 },
    '024': { name: '銅の剣', rare: 2, type: '剣', atk: 100 },
    '025': { name: '銅の銃', rare: 2, type: '銃', atk: 60 },
    '026': { name: '銅の杖', rare: 2, type: '魔法', atk: 160 },
    '027': { name: '鉄の剣', rare: 3, type: '剣', atk: 1000 },
    '028': { name: '鉄の銃', rare: 3, type: '銃', atk: 600 },
    '029': { name: '鉄の杖', rare: 3, type: '魔法', atk: 1600 },
    '030': { name: 'オーラを放つ剣', rare: 4, type: '剣', atk: 10000 },
    '031': { name: 'オーラを放つ銃', rare: 4, type: '銃', atk: 6000 },
    '032': { name: 'オーラを放つ杖', rare: 4, type: '魔法', atk: 16000 },
    '033': { name: '覇王の剣', rare: 5, type: '剣', atk: 100000 },
    '034': { name: '覇王の銃', rare: 5, type: '銃', atk: 60000 },
    '035': { name: '覇王の杖', rare: 5, type: '魔法', atk: 160000 }
};

const TREASURES = {
    't1': { name: '錆びた手鏡', type: 'atk', val: 0.02 },
    't2': { name: '旅人の財布', type: 'gold', val: 0.03 },
    't3': { name: '古びた虫眼鏡', type: 'hit_p', val: 0.01 },
    't4': { name: '魔導師の魔導書', type: 'pt', val: 0.20 },
    't5': { name: '覇王の刻印', type: 'pt', val: 1.00 }
};

let player = {
    gold: 0, diamond: 500, prestigePt: 0, stage: 1,
    // 所持しているキャラの最高レア度 (0 = 未所持, 1~5 = レア度)
    ownedCats: { '剣': 1, '銃': 0, '魔法': 0 }, 
    inventory: {'001': 1}, 
    treasures: {},
    upgrades: { atk: 0, hit: 0 }
};

let enemy = { hp: 100, maxHp: 100, name: '木人ボブ' };
const DROP_CHANCE = 0.25;
let currentLoadedWeaponIds = { '剣': '', '銃': '', '魔法': '' };

function toggleMenu() {
    const menu = document.getElementById('menu-overlay');
    menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
    if(menu.style.display === 'block') showDetailedStats();
}

function showDetailedStats() {
    let reqHit = getHitRequirement(player.stage);
    let myHit = getTotalHit();
    document.getElementById('detailed-stats').innerHTML = `
        ・最高到達ステージ: STAGE ${player.stage}<br>
        ・最高剣レア: 星${player.ownedCats['剣']} | 最高銃レア: 星${player.ownedCats['銃']} | 最高魔法レア: 星${player.ownedCats['魔法']}<br>
        ・宝物攻撃補正: +${(getTreasureBonus('atk') * 100).toFixed(0)}%<br>
        ・命中ステータス: ${myHit} / 必要: ${reqHit}
    `;
}

function getHitRequirement(stg) {
    let block = Math.floor((stg - 1) / 5);
    const hitRequirements = [0, 10, 30, 70, 150, 350, 800];
    return hitRequirements[block] !== undefined ? hitRequirements[block] : 800 + (block - 6) * 500;
}

function getEnemyMaxHp(stg) {
    if (stg <= 5) return 50 + stg * 50;
    let base = [2000, 25000, 200000, 2500000, 20000000, 250000000];
    let idx = Math.floor((stg - 1) / 5) - 1;
    return (base[idx] !== undefined ? base[idx] : 250000000 * Math.pow(10, idx - 5)) * (1 + (stg % 5) * 0.2);
}

function getPrestigePointGain() {
    if (player.stage < 5) return 0;
    return Math.floor(Math.floor(Math.pow(player.stage, 1.8) * 0.1) * (1 + getTreasureBonus('pt')));
}

function getTreasureBonus(type) {
    let bonus = 0;
    for (let id in player.treasures) {
        bonus += TREASURES[id].val + (player.treasures[id] - 1) * 0.01;
    }
    return bonus;
}

function getCatBestWeaponAtk(type) {
    let bestAtk = 0, bestWId = null;
    for (let id in WEAPONS) {
        if (WEAPONS[id].type === type && player.inventory[id]) {
            let currentAtk = WEAPONS[id].atk * (1 + (player.inventory[id] - 1) * 0.005);
            if (currentAtk > bestAtk) { bestAtk = currentAtk; bestWId = id; }
        }
    }
    return { atk: bestAtk, id: bestWId };
}

function getTotalHit() {
    return Math.floor(player.upgrades.hit * (1 + getTreasureBonus('hit_p')));
}

// UI更新処理（自動最強切り替え）
function updateUI() {
    document.getElementById('res-gold').innerText = Math.floor(player.gold).toLocaleString();
    document.getElementById('res-diamond').innerText = player.diamond.toLocaleString();
    document.getElementById('res-prestige').innerText = player.prestigePt.toLocaleString();
    document.getElementById('stage-display').innerText = `STAGE ${player.stage}`;
    document.getElementById('hit-requirement').innerText = `必要命中値: ${getHitRequirement(player.stage)}`;
    
    let myHit = getTotalHit(), reqHit = getHitRequirement(player.stage);
    document.getElementById('total-hit-val').innerText = myHit;
    document.getElementById('current-hit-rate').innerText = myHit < reqHit ? Math.max(0, 100 - (reqHit - myHit)) : 100;

    let tAtkBonus = 1 + getTreasureBonus('atk'), flatAtkBonus = player.upgrades.atk * 2;

    // --- 各スロットのレンダリング ---
    const types = ['剣', '銃', '魔法'];
    const catNames = { '剣': '茶ネコ', '銃': '銃ネコ', '魔法': '魔法ネコ' };

    types.forEach((type, index) => {
        let slotNum = index + 1;
        let slotEl = document.getElementById(`card-slot-${slotNum}`);
        let rare = player.ownedCats[type];

        if (rare > 0) {
            // 解放済みの場合、最強キャラ＆武器を自動表示
            if (slotEl.classList.contains('empty')) {
                slotEl.classList.remove('empty');
                slotEl.innerHTML = `<h4 id="name-cat-${slotNum}"></h4><img src="" class="cat-img" id="cat-main-img-${slotNum}"><div class="weapon-img-box"><img id="weap-img-cat-${slotNum}" class="weapon-img" src="" alt="武器"></div><div class="weapon-text" id="weap-cat-${slotNum}">-</div><div style="color: #d63031; font-weight: bold; font-size:12px;">ATK:<span id="atk-cat-${slotNum}">0</span></div>`;
            }
            
            document.getElementById(`name-cat-${slotNum}`).innerText = `${catNames[type]} (星${rare})`;
            // キャラ画像 (現状ある猫画像にマッピング)
            let catImgSrc = type === '剣' ? '1000007692.png' : (type === '銃' ? '1000007694.png' : '1000007695.png');
            document.getElementById(`cat-main-img-${slotNum}`).src = `images/${catImgSrc}`;

            let w = getCatBestWeaponAtk(type);
            if (w.id) {
                // キャラレア度による攻撃力倍率マルチプライヤー (星1=1倍, 星5=5倍)
                let finalAtk = Math.floor(((w.atk * rare) + flatAtkBonus) * tAtkBonus);
                document.getElementById(`weap-cat-${slotNum}`).innerText = `${WEAPONS[w.id].name} (${player.inventory[w.id]-1}凸)`;
                document.getElementById(`atk-cat-${slotNum}`).innerText = finalAtk.toLocaleString();
                if (currentLoadedWeaponIds[type] !== w.id) {
                    currentLoadedWeaponIds[type] = w.id;
                    document.getElementById(`weap-img-cat-${slotNum}`).src = `images/${w.id}.png`;
                }
            }
        } else {
            slotEl.className = 'party-card empty';
            slotEl.innerHTML = `<div>${catNames[type]}<br>未所持</div>`;
        }
    });

    let atkCost = Math.floor(10 * Math.pow(1.5, player.upgrades.atk));
    let hitCost = Math.floor(15 * Math.pow(1.6, player.upgrades.hit));
    document.getElementById('cost-up-atk').innerText = atkCost.toLocaleString();
    document.getElementById('btn-up-atk').disabled = player.gold < atkCost;
    document.getElementById('cost-up-hit').innerText = hitCost.toLocaleString();
    document.getElementById('btn-up-hit').disabled = player.gold < hitCost;
    document.getElementById('gain-prestige-pt').innerText = getPrestigePointGain().toLocaleString();

    let tHtml = "";
    for(let tid in player.treasures) { tHtml += `・${TREASURES[tid].name}Lv${player.treasures[tid]} `; }
    document.getElementById('treasure-display').innerHTML = tHtml ? `🎁 所持宝物: <br>${tHtml}` : "🎁 所持宝物: なし";

    let pct = Math.max(0, (enemy.hp / enemy.maxHp) * 100);
    document.getElementById('enemy-hp-bar').style.width = `${pct}%`;
    document.getElementById('enemy-hp-text').innerText = `HP: ${Math.floor(enemy.hp).toLocaleString()} / ${Math.floor(enemy.maxHp).toLocaleString()}`;
    document.getElementById('enemy-name').innerText = enemy.name;
}

function log(msg) {
    let box = document.getElementById('battle-log');
    box.innerHTML += msg + "<br>"; box.scrollTop = box.scrollHeight;
}

function buyUpgrade(type) {
    let atkCost = Math.floor(10 * Math.pow(1.5, player.upgrades.atk));
    let hitCost = Math.floor(15 * Math.pow(1.6, player.upgrades.hit));
    if (type === 'atk' && player.gold >= atkCost) { player.gold -= atkCost; player.upgrades.atk++; }
    else if (type === 'hit' && player.gold >= hitCost) { player.gold -= hitCost; player.upgrades.hit++; }
    updateUI();
}

// ガチャロジック (武器・キャラ完全に独立)
function rollGacha(gachaType) {
    let cost = gachaType === 'weapon' ? 100 : 150;
    if (player.diamond < cost) { alert("ダイヤが足りません！"); return; }
    player.diamond -= cost;

    let rand = Math.random() * 100;
    let rare = 1;
    if (rand < 1) rare = 5;       // 星5 (1%)
    else if (rand < 5) rare = 4;  // 星4 (4%)
    else if (rand < 15) rare = 3; // 星3 (10%)
    else if (rand < 30) rare = 2; // 星2 (15%)
    else rare = 1;                // 星1 (70%)

    if (gachaType === 'weapon') {
        // 武器ガチャ
        let pool = [];
        for (let id in WEAPONS) { if (WEAPONS[id].rare === rare) pool.push(id); }
        let selectedId = pool[Math.floor(Math.random() * pool.length)];
        player.inventory[selectedId] = (player.inventory[selectedId] || 0) + 1;
        document.getElementById('gacha-result').innerText = `★${rare} 武器【${WEAPONS[selectedId].name}】を獲得！`;
    } else {
        // キャラガチャ
        const types = ['剣', '銃', '魔法'];
        const catNames = { '剣': '茶ネコ', '銃': '銃ネコ', '魔法': '魔法ネコ' };
        let selectedType = types[Math.floor(Math.random() * types.length)];
        
        // 所持している同じ系統のキャラより強ければ、自動で切り替える
        if (rare > player.ownedCats[selectedType]) {
            player.ownedCats[selectedType] = rare;
            document.getElementById('gacha-result').innerText = `🎉 超超ラッキー！最高レア更新！ ★${rare} 【${catNames[selectedType]}】が参戦！`;
            // キャラ解放時、木の棒などの初期星1武器を自動支給
            let initWId = selectedType === '剣' ? '001' : (selectedType === '銃' ? '002' : '023');
            if(!player.inventory[initWId]) player.inventory[initWId] = 1;
        } else {
            document.getElementById('gacha-result').innerText = `★${rare} 【${catNames[selectedType]}】が重複した（現在の最高レアが強いためポイントに還元！）`;
            player.diamond += 30; // 被り救済
        }
    }
    updateUI();
}

function doPrestige() {
    let gain = getPrestigePointGain();
    if (gain <= 0) return;
    player.prestigePt += gain;
    player.stage = 1; player.gold = 0; player.upgrades.atk = 0; player.upgrades.hit = 0;
    currentLoadedWeaponIds = { '剣': '', '銃': '', '魔法': '' };
    log(`🔄 時空転生を行い、🌀 ${gain} Ptを獲得した！`); spawnEnemy(); updateUI();
}

function buyTreasure() {
    if (player.prestigePt < 10) return;
    player.prestigePt -= 10;
    let keys = Object.keys(TREASURES);
    let rolled = keys[Math.floor(Math.random() * keys.length)];
    player.treasures[rolled] = (player.treasures[rolled] || 0) + 1;
    log(`🎁 宝物【${TREASURES[rolled].name}】を獲得！`); updateUI();
}

function spawnEnemy() {
    enemy.maxHp = getEnemyMaxHp(player.stage); enemy.hp = enemy.maxHp;
    const names = ['スライムボブ', 'ゴブリンリーダー', 'オーク将軍', '鉄壁のゴーレム', '古のレッドドラゴン'];
    enemy.name = `STAGE ${player.stage} : ${names[(player.stage-1) % names.length]}`;
}

function catAttack(catType) {
    let rare = player.ownedCats[catType];
    if (rare === 0) return; // 未所持なら攻撃しない

    let reqHit = getHitRequirement(player.stage); let myHit = getTotalHit();
    let hitRate = 100; if (myHit < reqHit) hitRate = Math.max(0, 100 - (reqHit - myHit));
    if (Math.random() * 100 > hitRate) { return; }

    let w = getCatBestWeaponAtk(catType);
    if (!w.id) return;
    
    let tAtkBonus = 1 + getTreasureBonus('atk'), flatAtkBonus = player.upgrades.atk * 2;
    // キャラ自体の強さ（レア度倍率）を掛け算！
    let baseDmg = ((w.atk * rare) + flatAtkBonus) * tAtkBonus;
    
    if (w.id === '033') baseDmg *= 2; if (w.id === '035') baseDmg *= 3; 
    if (w.id === '030' && Math.random() < 0.15) baseDmg *= 4; 
    if (w.id === '032' && Math.random() < 0.30) baseDmg *= 3;

    let finalDmg = Math.floor(baseDmg); enemy.hp -= finalDmg;
    
    let catDisplayName = (catType === '剣') ? '茶' : catType;
    log(`⚔️ 星${rare}・${catDisplayName}ネコが ${finalDmg.toLocaleString()} ダメージ！`);
    
    if (w.id === '034' && Math.random() < 0.40) {
        enemy.hp -= finalDmg * 3; log(`⚡ 覇王の銃の追撃！ ${(finalDmg * 3).toLocaleString()} ダメージ！`);
    }
    if (enemy.hp <= 0) { enemy.hp = 0; enemyKilled(); }
    updateUI();
}

function enemyKilled() {
    player.gold += player.stage * 5 * (1 + getTreasureBonus('gold'));
    if (Math.random() < DROP_CHANCE) { player.diamond += 5 + Math.floor(player.stage * 1.5); }
    player.stage++; spawnEnemy();
}

function initGame() {
    spawnEnemy();
    setInterval(() => catAttack('剣'), 1000);
    setInterval(() => catAttack('銃'), 600);
    setInterval(() => catAttack('魔法'), 1600);
    setInterval(updateUI, 250);
}
window.onload = initGame;
</script>
